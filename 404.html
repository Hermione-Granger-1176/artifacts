<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Artifacts</title>
    <style>
        :root {
            --color-dust-grey: #d6d6d6;
            --color-bright-amber: #ffd100;
            --color-carbon-black: #202020;
            --color-graphite: #333533;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            font-family: "Inter", system-ui, sans-serif;
            color: var(--color-dust-grey);
            background:
                radial-gradient(circle at top, rgba(255, 209, 0, 0.12), transparent 35%),
                linear-gradient(180deg, #262626 0%, var(--color-carbon-black) 100%);
        }

        main {
            width: min(100%, 36rem);
            padding: 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 1.25rem;
            background: rgba(51, 53, 51, 0.88);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
            text-align: center;
        }

        p {
            margin: 0 0 1rem;
            color: rgba(214, 214, 214, 0.72);
            line-height: 1.6;
        }

        .eyebrow {
            margin-bottom: 0.75rem;
            color: var(--color-bright-amber);
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 1rem;
            font-size: clamp(2rem, 5vw, 3rem);
            line-height: 1.1;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 1rem;
            padding: 0.85rem 1.4rem;
            border-radius: 0.75rem;
            background: var(--color-bright-amber);
            color: var(--color-carbon-black);
            font-weight: 700;
            text-decoration: none;
        }

        a:hover {
            filter: brightness(1.05);
        }
    </style>
</head>
<body data-site-path="/">
    <main>
        <div class="eyebrow">404 Error</div>
        <h1>That artifact is missing.</h1>
        <p>The page you requested does not exist, or the URL is no longer valid.</p>
        <p>Head back to the gallery to browse the available interactive artifacts.</p>
        <a id="home-link" href="/">Return to gallery</a>
    </main>
    <script>
        const homeLink = document.getElementById("home-link");
        const sitePath = document.body.dataset.sitePath || "/";
        const siteParts = sitePath.split("/").filter(Boolean);
        const pathParts = window.location.pathname.split("/").filter(Boolean);
        const isPreviewPath =
            pathParts.length >= siteParts.length + 2 &&
            pathParts.slice(0, siteParts.length).join("/") === siteParts.join("/") &&
            pathParts[siteParts.length] === "pr-preview";

        if (isPreviewPath) {
            const previewRoot = [...siteParts, "pr-preview", pathParts[siteParts.length + 1]];
            homeLink.href = `/${previewRoot.join("/")}/`;
        } else {
            homeLink.href = sitePath;
        }
    </script>
</body>
</html>
