<!DOCTYPE html>
<html lang="en" data-theme="dark" data-runtime-status="booting">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A collection of interactive HTML artifacts built with AI tools (Claude, ChatGPT, Gemini).">
    <title>Artifacts | Aditya Kumar Darak</title>
    <script>
        try {
            document.documentElement.dataset.theme = localStorage.getItem('theme') || 'dark';
        } catch (_error) {
            document.documentElement.dataset.theme = 'dark';
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"
        media="print" onload="this.media='all'">
    <noscript>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet">
    </noscript>
    <meta name="theme-color" content="#202020">
</head>

<body class="js-loading">
    <header class="header">
        <div class="header-content">
            <a href="./" class="logo-link">
                <img src="https://avatars.githubusercontent.com/u/81145827?v=4" alt="Aditya Kumar Darak"
                    class="logo-avatar">
                <h1 class="logo">Artifacts</h1>
            </a>
            <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme">
                <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </header>

    <div id="runtime-error" class="runtime-error hidden" role="alert" aria-live="assertive">
        <p>The gallery failed to initialize correctly. Reload the page, or try again later.</p>
    </div>

    <main class="container">
        <section class="controls">
            <div class="search-wrapper">
                <label for="search-input" class="visually-hidden">Search artifacts</label>
                <input type="text" id="search-input" placeholder="Search artifacts...  ( / )" autocomplete="off">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <button id="search-clear" class="search-clear hidden" aria-label="Clear search">&times;</button>
            </div>

            <div class="control-cluster">
                <section class="filter-section" aria-label="Filters">
                    <div id="tool-dropdown" class="filter-dropdown">
                        <button id="tool-filter-toggle" class="filter-dropdown-toggle" type="button"
                            aria-haspopup="listbox" aria-expanded="false" aria-controls="tool-filter-panel">
                            <span id="tool-filter-label" class="filter-dropdown-label">All tools</span>
                            <svg class="filter-dropdown-chevron" xmlns="http://www.w3.org/2000/svg" width="16"
                                height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                        <div id="tool-filter-panel" class="filter-dropdown-panel" role="listbox"
                            aria-label="Filter by AI tool" aria-multiselectable="true" aria-hidden="true"></div>
                    </div>

                    <div id="tag-dropdown" class="filter-dropdown">
                        <button id="tag-filter-toggle" class="filter-dropdown-toggle" type="button"
                            aria-haspopup="listbox" aria-expanded="false" aria-controls="tag-filter-panel">
                            <span id="tag-filter-label" class="filter-dropdown-label">All tags</span>
                            <svg class="filter-dropdown-chevron" xmlns="http://www.w3.org/2000/svg" width="16"
                                height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                        <div id="tag-filter-panel" class="filter-dropdown-panel" role="listbox"
                            aria-label="Filter by tag" aria-multiselectable="true" aria-hidden="true"></div>
                    </div>

                    <button id="sort-toggle" class="sort-toggle" type="button" aria-label="Sort by newest first"
                        title="Sort by newest first">
                        <svg class="sort-toggle-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M12 5v14"></path>
                            <path d="m17 14-5 5-5-5"></path>
                        </svg>
                    </button>

                    <button id="filter-reset" class="filter-reset hidden" type="button" aria-label="Reset filters"
                        title="Reset filters"></button>
                </section>
            </div>
        </section>

        <section id="artifacts-grid" class="artifacts-grid" aria-live="polite">
            <noscript>
                <p>JavaScript is required to browse the artifact gallery.</p>
            </noscript>
        </section>

        <div id="no-results" class="no-results hidden" role="status">
            <p>No artifacts found matching your filters.</p>
            <button id="no-results-reset" class="btn-reset-link">Clear search and filters</button>
        </div>

        <nav id="pagination" class="pagination" aria-label="Pagination"></nav>
    </main>

    <button id="scroll-top" class="scroll-top" aria-label="Scroll to top">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    <div id="detail-overlay" class="detail-overlay" aria-hidden="true">
        <div class="detail-backdrop" data-close-detail></div>
        <section id="detail-panel" class="detail-panel" role="dialog" aria-modal="true"
            aria-labelledby="detail-title" tabindex="-1"></section>
    </div>

    <footer class="footer">
        <p>&copy; Aditya Kumar Darak &middot; <a href="https://github.com/Hermione-Granger-1176" target="_blank"
                rel="noopener noreferrer">GitHub</a> &middot; <a href="https://www.linkedin.com/in/aditya-darak/"
                target="_blank" rel="noopener noreferrer">LinkedIn</a></p>
    </footer>

    <script src="js/gallery-config.js"></script>
    <script src="js/data.js"></script>
    <script type="module" src="js/app.js"></script>
</body>

</html>
