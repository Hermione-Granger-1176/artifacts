<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <style>
    .layer-back { fill: #D97706; }
    .layer-mid { fill: #E5A040; }
    .layer-front { fill: #F0C070; }
    @media (prefers-color-scheme: light) {
      .layer-back { fill: #92400E; }
      .layer-mid { fill: #B45309; }
      .layer-front { fill: #D97706; }
    }
  </style>
  <rect class="layer-back" x="12" y="12" width="72" height="72" rx="14"/>
  <rect class="layer-mid" x="28" y="28" width="72" height="72" rx="14"/>
  <rect class="layer-front" x="44" y="44" width="72" height="72" rx="14"/>
</svg>
