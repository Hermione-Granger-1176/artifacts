version: 2

updates:
  - package-ecosystem: uv
    target-branch: main
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - python
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    target-branch: main
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    groups:
      all-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    target-branch: main
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - javascript
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    groups:
      minor-patch:
        patterns:
          - "*"

  - package-ecosystem: npm
    target-branch: main
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels:
      - dependencies
      - javascript
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"
    groups:
      major:
        patterns:
          - "*"
        update-types:
          - "major"
