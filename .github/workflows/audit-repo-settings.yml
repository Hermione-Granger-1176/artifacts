name: Audit Repository Settings

on:
  workflow_dispatch:
  schedule:
    - cron: '23 8 * * 1'

env:
  PYTHONPATH: '.'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: CI setup
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          audit-app-id: ${{ vars.AUDIT_APP_ID }}
          audit-app-private-key: ${{ secrets.AUDIT_APP_PRIVATE_KEY }}

      - name: Audit repository settings
        id: audit
        env:
          GH_TOKEN: ${{ steps.setup.outputs.audit-token }}
        run: |
          set +e
          python3 scripts/ci/workflow_helpers.py audit-repo-settings \
            --repo "${{ github.repository }}" \
            --default-branch main \
            --pages-branch gh-pages > audit-repo-settings.json 2>&1
          status=$?
          set -e
          cat audit-repo-settings.json
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Open or update repository settings drift issue
        if: steps.audit.outputs.status != '0'
        id: drift-issue
        env:
          GH_TOKEN: ${{ steps.setup.outputs.audit-token }}
        run: |
          body=$(cat <<EOF
          Repository settings drift was detected by the scheduled audit workflow.

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Current failure output:
          \`\`\`text
          $(cat audit-repo-settings.json)
          \`\`\`
          EOF
          )
          issue_url=$(python3 scripts/ci/workflow_helpers.py sync-alert-issue \
            --repo "${{ github.repository }}" \
            --title "Repository settings drift detected" \
            --body "$body" \
            --label ops \
            --label ci \
            --should-exist true)
          echo "url=$issue_url" >> "$GITHUB_OUTPUT"

      - name: Close repository settings drift issue when clean
        if: steps.audit.outputs.status == '0'
        env:
          GH_TOKEN: ${{ steps.setup.outputs.audit-token }}
        run: |
          body=$(cat <<'EOF'
          Repository settings drift is no longer detected.

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )
          python3 scripts/ci/workflow_helpers.py sync-alert-issue \
            --repo "${{ github.repository }}" \
            --title "Repository settings drift detected" \
            --body "$body" \
            --label ops \
            --label ci \
            --should-exist false >/dev/null

      - name: Summarize audit
        if: steps.audit.outputs.status == '0'
        run: |
          {
            echo "## Repository settings audit"
            echo
            echo '```json'
            cat audit-repo-settings.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize audit failure
        if: steps.audit.outputs.status != '0'
        run: |
          {
            echo "## Repository settings audit failed"
            echo
            echo "Inspect the \`audit-repo-settings\` output in this run for the exact drift report."
            echo
            echo "Issue: ${{ steps.drift-issue.outputs.url || 'issue not created' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow when audit detects drift
        if: steps.audit.outputs.status != '0'
        run: exit 1
