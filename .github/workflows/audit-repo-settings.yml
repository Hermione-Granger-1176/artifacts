name: Audit Repository Settings

on:
  workflow_dispatch:
  schedule:
    - cron: "23 8 * * 1"

env:
  PYTHONPATH: "."
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: CI setup
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          audit-app-id: ${{ vars.AUDIT_APP_ID }}
          audit-app-private-key: ${{ secrets.AUDIT_APP_PRIVATE_KEY }}

      - name: Audit repository settings
        id: audit
        env:
          GH_TOKEN: ${{ steps.setup.outputs.audit-token }}
        run: |
          set +e
          make ci-audit-repo-settings > audit-repo-settings.json 2>&1
          settings_status=$?
          make ci-audit-previews >> audit-repo-settings.json 2>&1
          previews_status=$?
          set -e
          cat audit-repo-settings.json
          if [ "$settings_status" -ne 0 ] || [ "$previews_status" -ne 0 ]; then
            status=1
          else
            status=0
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Open or update repository settings drift issue
        if: steps.audit.outputs.status != '0'
        id: drift-issue
        env:
          GH_TOKEN: ${{ steps.setup.outputs.audit-token }}
        run: |
          url=$(make ci-alert-issue state=open title="Repository settings drift detected" run_url="$RUN_URL" detail_file=audit-repo-settings.json)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Close repository settings drift issue when clean
        if: steps.audit.outputs.status == '0'
        env:
          GH_TOKEN: ${{ steps.setup.outputs.audit-token }}
        run: make ci-alert-issue state=close title="Repository settings drift detected" run_url="$RUN_URL"

      - name: Summarize audit
        if: steps.audit.outputs.status == '0'
        run: |
          {
            echo "## Repository settings audit"
            echo
            echo '```json'
            cat audit-repo-settings.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize audit failure
        if: steps.audit.outputs.status != '0'
        run: |
          {
            echo "## Repository settings audit failed"
            echo
            echo "Inspect the \`audit-repo-settings\` output in this run for the exact drift report."
            echo
            echo "Issue: ${{ steps.drift-issue.outputs.url || 'issue not created' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert when repository settings audit setup fails
        if: failure() && steps.audit.outputs.status == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: make ci-alert-issue state=setup-failure title="Repository settings drift detected" run_url="$RUN_URL"

      - name: Fail workflow when audit detects drift
        if: steps.audit.outputs.status != '0'
        run: exit 1
