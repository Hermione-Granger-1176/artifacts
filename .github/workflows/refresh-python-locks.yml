name: Refresh Python Locks

on:
  pull_request:
    branches:
      - main
    paths:
      - pyproject.toml
    types:
      - opened
      - reopened
      - synchronize
  workflow_run:
    workflows:
      - Refresh Python Locks
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  refresh-locks:
    if: >-
      github.event_name == 'pull_request' &&
      github.actor == 'dependabot[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'dependabot/pip/') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout Dependabot branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Refresh Python lock files
        run: make lock

      - name: Write refresh metadata
        run: |
          mkdir -p .artifacts
          printf '%s\n' '${{ github.event.pull_request.number }}' > .artifacts/pr-number.txt
          printf '%s\n' '${{ github.event.pull_request.head.sha }}' > .artifacts/head-sha.txt
          printf '%s\n' '${{ github.event.pull_request.head.ref }}' > .artifacts/head-ref.txt

      - name: Upload refreshed Python lock files
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-lock-refresh-${{ github.event.pull_request.number }}
          path: |
            locks/requirements.lock
            locks/requirements-dev.lock
            .artifacts/pr-number.txt
            .artifacts/head-sha.txt
            .artifacts/head-ref.txt
          if-no-files-found: error

  commit-locks:
    if: >-
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.name == 'Refresh Python Locks' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout default branch workflow code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Download refreshed Python lock files
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-lock-refresh-${{ github.event.workflow_run.pull_requests[0].number }}
          path: .artifacts/lock-refresh
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Read refresh metadata
        id: metadata
        run: |
          echo "pr-number=$(tr -d '\n' < .artifacts/lock-refresh/.artifacts/pr-number.txt)" >> "$GITHUB_OUTPUT"
          echo "head-sha=$(tr -d '\n' < .artifacts/lock-refresh/.artifacts/head-sha.txt)" >> "$GITHUB_OUTPUT"
          echo "head-ref=$(tr -d '\n' < .artifacts/lock-refresh/.artifacts/head-ref.txt)" >> "$GITHUB_OUTPUT"

      - name: Validate Dependabot branch state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_sha=$(gh pr view "${{ steps.metadata.outputs.pr-number }}" --json headRefOid --jq .headRefOid)
          current_ref=$(gh pr view "${{ steps.metadata.outputs.pr-number }}" --json headRefName --jq .headRefName)
          if [ "$current_sha" != "${{ steps.metadata.outputs.head-sha }}" ] || [ "$current_ref" != "${{ steps.metadata.outputs.head-ref }}" ]; then
            echo "Dependabot branch moved since lock refresh artifact generation; skipping stale commit." >&2
            exit 1
          fi

      - name: Copy refreshed Python lock files into workspace
        run: |
          cp .artifacts/lock-refresh/locks/requirements.lock locks/requirements.lock
          cp .artifacts/lock-refresh/locks/requirements-dev.lock locks/requirements-dev.lock

      - name: Detect Python lock file changes
        id: changes
        run: |
          git add locks/requirements.lock locks/requirements-dev.lock
          if git diff --staged --quiet -- locks/requirements.lock locks/requirements-dev.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit refreshed Python lock files (verified)
        if: steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ github.token }}
          base-branch: ${{ steps.metadata.outputs.head-ref }}
          expected-head-sha: ${{ steps.metadata.outputs.head-sha }}
          commit-headline: "Refresh Python lock files [skip ci]"
          fallback-branch-prefix: ci/refresh-python-locks
          pr-title: "Refresh Python lock files"
          pr-body: |
            ## Summary
            - Type: CI maintenance
            - Refresh `locks/requirements.lock` and `locks/requirements-dev.lock` to match the Dependabot Python update
            - Keep Python installs reproducible in local and CI workflows
          pathspec: |
            locks/requirements.lock
            locks/requirements-dev.lock
