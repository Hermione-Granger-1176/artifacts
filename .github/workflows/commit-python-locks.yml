name: Commit Refreshed Python Locks

on:
  workflow_run:
    workflows:
      - Refresh Python Locks
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONPATH: "."

jobs:
  commit-locks:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.name == 'Refresh Python Locks' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      LOCK_REFRESH_ROOT: .artifacts/lock-refresh
      LOCK_FILE_PATHSPEC: uv.lock
    permissions:
      actions: read
      contents: write
      pull-requests: write
    steps:
      - name: Checkout default branch workflow code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1
          persist-credentials: false

      - name: Validate triggering Dependabot workflow run
        id: triggering-run
        run: >-
          python3 scripts/ci/workflow_helpers.py lock-refresh-workflow-run
          --event-path "$GITHUB_EVENT_PATH"
          --repository "$GITHUB_REPOSITORY"
          >> "$GITHUB_OUTPUT"

      - name: Detect lock refresh artifact
        id: artifact
        env:
          GH_TOKEN: ${{ github.token }}
          LOCK_REFRESH_ARTIFACT_NAME: ${{ steps.triggering-run.outputs.artifact-name }}
          LOCK_REFRESH_RUN_ID: ${{ steps.triggering-run.outputs.run-id }}
        run: |
          artifact_id=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$LOCK_REFRESH_RUN_ID/artifacts" --jq ".artifacts[] | select(.name == \"$LOCK_REFRESH_ARTIFACT_NAME\") | .id" 2>/dev/null || true)
          if [ -n "$artifact_id" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download refreshed Python lock files
        if: steps.artifact.outputs.available == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ steps.triggering-run.outputs.artifact-name }}
          path: ${{ env.LOCK_REFRESH_ROOT }}
          run-id: ${{ steps.triggering-run.outputs.run-id }}
          github-token: ${{ github.token }}

      - name: Validate downloaded artifact contents
        if: steps.artifact.outputs.available == 'true'
        env:
          LOCK_REFRESH_HEAD_REF: ${{ steps.triggering-run.outputs.head-ref }}
          LOCK_REFRESH_HEAD_SHA: ${{ steps.triggering-run.outputs.head-sha }}
          LOCK_REFRESH_PR_NUMBER: ${{ steps.triggering-run.outputs.pr-number }}
        run: >-
          python3 scripts/ci/workflow_helpers.py validate-lock-artifact
          --root "$LOCK_REFRESH_ROOT"
          --expected-pr-number "$LOCK_REFRESH_PR_NUMBER"
          --expected-head-sha "$LOCK_REFRESH_HEAD_SHA"
          --expected-head-ref "$LOCK_REFRESH_HEAD_REF"

      - name: Validate Dependabot branch state
        if: steps.artifact.outputs.available == 'true'
        id: branch-state
        env:
          GH_TOKEN: ${{ github.token }}
          LOCK_REFRESH_HEAD_REF: ${{ steps.triggering-run.outputs.head-ref }}
          LOCK_REFRESH_HEAD_SHA: ${{ steps.triggering-run.outputs.head-sha }}
          LOCK_REFRESH_PR_NUMBER: ${{ steps.triggering-run.outputs.pr-number }}
        run: |
          current_sha=$(gh pr view "$LOCK_REFRESH_PR_NUMBER" --json headRefOid --jq .headRefOid)
          current_ref=$(gh pr view "$LOCK_REFRESH_PR_NUMBER" --json headRefName --jq .headRefName)
          if [ "$current_sha" != "$LOCK_REFRESH_HEAD_SHA" ] || [ "$current_ref" != "$LOCK_REFRESH_HEAD_REF" ]; then
            echo "Dependabot branch moved since lock refresh artifact generation; skipping stale commit." >&2
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "stale=false" >> "$GITHUB_OUTPUT"

      - name: Copy refreshed Python lock files into workspace
        if: steps.artifact.outputs.available == 'true' && steps.branch-state.outputs.stale != 'true'
        run: cp "$LOCK_REFRESH_ROOT/uv.lock" uv.lock

      - name: Detect Python lock file changes
        if: steps.artifact.outputs.available == 'true' && steps.branch-state.outputs.stale != 'true'
        id: changes
        run: |
          git add "$LOCK_FILE_PATHSPEC"
          if git diff --staged --quiet -- "$LOCK_FILE_PATHSPEC"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit refreshed Python lock files (verified)
        if: steps.artifact.outputs.available == 'true' && steps.branch-state.outputs.stale != 'true' && steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ github.token }}
          base-branch: ${{ steps.triggering-run.outputs.head-ref }}
          expected-head-sha: ${{ steps.triggering-run.outputs.head-sha }}
          commit-headline: "Refresh Python lock files [skip ci]"
          fallback-branch-prefix: ci/refresh-python-locks
          pr-title: "Refresh Python lock files"
          pr-body: |
            ## Summary
            - Type: CI maintenance
            - Refresh `uv.lock` to match the Dependabot Python update
            - Keep Python installs reproducible in local and CI workflows
          pathspec: ${{ env.LOCK_FILE_PATHSPEC }}
