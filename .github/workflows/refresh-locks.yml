name: Refresh Locks

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHON_VERSION: "3.12"
      NODE_VERSION: "24"
    steps:
      - name: Create escalation token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: escalation-token
        with:
          app-id: ${{ vars.ESCALATION_APP_ID }}
          private-key: ${{ secrets.ESCALATION_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Capture default branch HEAD SHA
        id: head
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: uv.lock

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Refresh Python lock files
        run: make lock

      - name: Refresh Node lock file
        run: make lock-node

      - name: Detect lock changes
        id: changes
        run: |
          git add uv.lock package-lock.json
          if git diff --staged --quiet -- uv.lock package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes (verified)
        if: steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ steps.escalation-token.outputs.token }}
          base-branch: ${{ github.event.repository.default_branch }}
          expected-head-sha: ${{ steps.head.outputs.sha }}
          commit-headline: "Refresh dependency lock files"
          fallback-branch-prefix: ci/refresh-locks
          pr-title: "Refresh dependency lock files"
          pr-body: |
            ## Summary
            - Type: CI maintenance
            - Regenerate `uv.lock` and `package-lock.json`
            - Picks up transitive dependency bumps (including security patches) that Dependabot does not propose directly
          pathspec: |
            uv.lock
            package-lock.json
          commit-mode: force-pr
