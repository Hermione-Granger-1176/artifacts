name: Refresh Locks

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHON_VERSION: "3.12"
      NODE_VERSION: "24"
    steps:
      - name: Create escalation token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: escalation-token
        with:
          app-id: ${{ vars.ESCALATION_APP_ID }}
          private-key: ${{ secrets.ESCALATION_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Capture default branch HEAD SHA
        id: head
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: locks/requirements-dev.lock

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Refresh Python lock files
        run: make lock

      - name: Refresh Node lock file
        run: make lock-node

      - name: Detect lock changes
        id: changes
        run: |
          git add locks package-lock.json
          if git diff --staged --quiet -- locks package-lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes (verified)
        if: steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ steps.escalation-token.outputs.token }}
          base-branch: ${{ github.event.repository.default_branch }}
          expected-head-sha: ${{ steps.head.outputs.sha }}
          commit-headline: "Refresh dependency lock files"
          fallback-branch-prefix: ci/refresh-locks
          pr-title: "Refresh dependency lock files"
          pr-body: |
            ## Summary
            - Type: CI maintenance
            - Regenerate `locks/requirements.lock`, `locks/requirements-dev.lock`, and `package-lock.json`
            - Picks up transitive dependency bumps (including security patches) that Dependabot does not propose directly
          pathspec: |
            locks
            package-lock.json
          commit-mode: force-pr
