name: Update Artifacts & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Create GitHub App token
        id: app-token
        if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up Python
        if: github.event.action != 'closed'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        if: github.event.action != 'closed'
        run: make setup-ci

      - name: Lint Python scripts and tests
        if: github.event.action != 'closed'
        run: make lint

      - name: Run Python tests
        if: github.event.action != 'closed'
        run: make test

      - name: Validate artifact directories
        if: github.event.action != 'closed'
        run: make validate

      - name: Generate thumbnails
        if: github.event.action != 'closed'
        run: make thumbnails

      - name: Generate content index
        if: github.event.action != 'closed'
        run: make index

      - name: Detect changes
        if: github.event.action != 'closed'
        id: changes
        run: |
          git add -A js/data.js README.md apps
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated files (verified)
        if: github.event_name != 'pull_request' && github.event.action != 'closed' && steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          base-branch: ${{ github.ref_name }}
          expected-head-sha: ${{ github.sha }}
          commit-headline: "ci: update generated artifacts [skip ci]"
          fallback-branch-prefix: auto/update-artifacts
          pr-title: "ci: update generated artifacts"
          pr-body: |
            ## Summary
            - Type: CI automation
            - Update generated artifacts from the `update.yml` workflow
            - Direct commit to the default branch was blocked by branch protection
          pathspec: |
            js/data.js
            README.md
            apps

      - name: Re-checkout after API commit
        if: github.event_name != 'pull_request' && github.event.action != 'closed' && steps.changes.outputs.changed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare deployable site
        if: github.event.action != 'closed'
        run: make site

      - name: Deploy PR preview
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        id: preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: _site
          preview-branch: gh-pages
          token: ${{ steps.app-token.outputs.token }}
          comment: false
          qr-code: false

      - name: Post PR preview link
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && !github.event.pull_request.head.repo.fork
        uses: marocchino/sticky-pull-request-comment@67d0dec7b07ed060a405f9b2a64b8ab319fdd7db # v2
        with:
          header: pr-preview
          recreate: true
          message: |
            CI preview

            Preview URL: ${{ steps.preview.outputs.preview-url }}

      - name: Remove PR preview link comment
        if: github.event_name == 'pull_request' && github.event.action == 'closed' && !github.event.pull_request.head.repo.fork
        uses: marocchino/sticky-pull-request-comment@67d0dec7b07ed060a405f9b2a64b8ab319fdd7db # v2
        with:
          header: pr-preview
          delete: true

      - name: Summarize PR preview
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && !github.event.pull_request.head.repo.fork
        run: |
          {
            echo "## PR Preview"
            echo
            echo "Preview URL: ${{ steps.preview.outputs.preview-url }}"
            echo
            if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
              echo "Generated files changed during this run:"
              echo
              echo '```text'
              git diff --staged --name-status -- js/data.js README.md apps
              echo '```'
            else
              echo "No generated file changes were detected during this run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Note fork PR preview limitation
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.fork
        run: |
          {
            echo "## PR Preview"
            echo
            echo "Preview deployment is skipped for fork-based pull requests because this workflow does not expose the app token to forks."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy main site to gh-pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: gh-pages
          folder: _site
          token: ${{ steps.app-token.outputs.token }}
          clean-exclude: |
            pr-preview/
          force: false
          commit-message: Deploy site for ${{ github.sha }}
