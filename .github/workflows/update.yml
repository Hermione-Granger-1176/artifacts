name: Update Artifacts & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install Playwright
        run: pip install playwright && playwright install chromium --with-deps

      - name: Generate thumbnails
        run: python scripts/generate_thumbnails.py

      - name: Generate content index
        run: python scripts/generate_index.py

      - name: Detect changes
        id: changes
        run: |
          git add js/data.js README.md apps/*/thumbnail.png
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated files (verified)
        if: steps.changes.outputs.changed == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require("fs");
            const path = require("path");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = context.ref.replace("refs/heads/", "");
            const headSha = context.sha;

            // Collect changed files
            const additions = [];
            const trackedFiles = [
              "js/data.js",
              "README.md",
            ];

            // Add thumbnail files
            const appsDir = "apps";
            for (const entry of fs.readdirSync(appsDir, { withFileTypes: true })) {
              if (entry.isDirectory()) {
                const thumbPath = path.join(appsDir, entry.name, "thumbnail.png");
                if (fs.existsSync(thumbPath)) {
                  trackedFiles.push(thumbPath);
                }
              }
            }

            for (const filePath of trackedFiles) {
              if (fs.existsSync(filePath)) {
                additions.push({
                  path: filePath,
                  contents: fs.readFileSync(filePath).toString("base64"),
                });
              }
            }

            if (additions.length === 0) {
              core.info("No files to commit");
              return;
            }

            const mutation = `
              mutation ($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                  commit { oid url }
                }
              }
            `;

            try {
              const result = await github.graphql(mutation, {
                input: {
                  branch: {
                    repositoryNameWithOwner: `${owner}/${repo}`,
                    branchName: defaultBranch,
                  },
                  expectedHeadOid: headSha,
                  message: {
                    headline: "Auto-update artifacts [skip ci]",
                  },
                  fileChanges: { additions },
                },
              });
              core.info(
                `Created verified commit: ${result.createCommitOnBranch.commit.url}`
              );
            } catch (err) {
              core.info(
                `Direct commit failed (${err.message}), creating branch and PR`
              );

              const date = new Date()
                .toISOString()
                .slice(0, 10)
                .replace(/-/g, "");
              const newBranch = `auto/update-artifacts-${date}`;

              let branchSha = headSha;
              try {
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/heads/${newBranch}`,
                  sha: headSha,
                });
              } catch {
                const { data: existingRef } = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${newBranch}`,
                });
                branchSha = existingRef.object.sha;
              }

              await github.graphql(mutation, {
                input: {
                  branch: {
                    repositoryNameWithOwner: `${owner}/${repo}`,
                    branchName: newBranch,
                  },
                  expectedHeadOid: branchSha,
                  message: {
                    headline: "Auto-update artifacts",
                  },
                  fileChanges: { additions },
                },
              });

              const { data: existing } = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                head: `${owner}:${newBranch}`,
              });

              if (existing.length === 0) {
                const { data: pr } = await github.rest.pulls.create({
                  owner,
                  repo,
                  head: newBranch,
                  base: defaultBranch,
                  title: "Auto-update artifacts",
                  body: "## Summary\n- Auto-generated artifacts update from `update.yml` workflow\n- Direct commit to default branch was blocked by branch protection\n",
                });
                core.info(`Created PR: ${pr.html_url}`);
              } else {
                core.info(`Updated existing PR: ${existing[0].html_url}`);
              }
            }

      - name: Re-checkout after API commit
        if: steps.changes.outputs.changed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
