name: Update Artifacts & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Create GitHub App token
        id: app-token
        if: github.event_name != 'pull_request'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: make setup-ci

      - name: Lint Python scripts and tests
        run: make lint

      - name: Run Python tests
        run: make test

      - name: Generate thumbnails
        run: make thumbnails

      - name: Generate content index
        run: make index

      - name: Detect changes
        id: changes
        run: |
          git add -A js/data.js README.md apps
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated files (verified)
        if: github.event_name != 'pull_request' && steps.changes.outputs.changed == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require("fs");
            const { execSync } = require("child_process");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = context.ref.replace("refs/heads/", "");
            const headSha = context.sha;

            const additions = [];
            const deletions = [];
            const diffOutput = execSync(
              "git diff --staged --name-status -- js/data.js README.md apps"
            ).toString().trim();

            if (!diffOutput) {
              core.info("No files to commit");
              return;
            }

            for (const line of diffOutput.split("\n")) {
              const [status, filePath] = line.split(/\s+/, 2);
              if (status === "D") {
                deletions.push({ path: filePath });
              } else if (fs.existsSync(filePath)) {
                additions.push({
                  path: filePath,
                  contents: fs.readFileSync(filePath).toString("base64"),
                });
              }
            }

            if (additions.length === 0 && deletions.length === 0) {
              core.info("No files to commit");
              return;
            }

            const mutation = `
              mutation ($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                  commit { oid url }
                }
              }
            `;

            try {
              const result = await github.graphql(mutation, {
                input: {
                  branch: {
                    repositoryNameWithOwner: `${owner}/${repo}`,
                    branchName: defaultBranch,
                  },
                  expectedHeadOid: headSha,
                  message: {
                    headline: "Auto-update artifacts [skip ci]",
                  },
                  fileChanges: { additions, deletions },
                },
              });
              core.info(
                `Created verified commit: ${result.createCommitOnBranch.commit.url}`
              );
            } catch (err) {
              core.info(
                `Direct commit failed (${err.message}), creating branch and PR`
              );

              const date = new Date()
                .toISOString()
                .slice(0, 10)
                .replace(/-/g, "");
              const newBranch = `auto/update-artifacts-${date}`;

              let branchSha = headSha;
              try {
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/heads/${newBranch}`,
                  sha: headSha,
                });
              } catch {
                const { data: existingRef } = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${newBranch}`,
                });
                branchSha = existingRef.object.sha;
              }

              await github.graphql(mutation, {
                input: {
                  branch: {
                    repositoryNameWithOwner: `${owner}/${repo}`,
                    branchName: newBranch,
                  },
                  expectedHeadOid: branchSha,
                  message: {
                    headline: "Auto-update artifacts",
                  },
                  fileChanges: { additions, deletions },
                },
              });

              const { data: existing } = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                head: `${owner}:${newBranch}`,
              });

              if (existing.length === 0) {
                const { data: pr } = await github.rest.pulls.create({
                  owner,
                  repo,
                  head: newBranch,
                  base: defaultBranch,
                  title: "Auto-update artifacts",
                  body: "## Summary\n- Auto-generated artifacts update from `update.yml` workflow\n- Direct commit to default branch was blocked by branch protection\n",
                });
                core.info(`Created PR: ${pr.html_url}`);
              } else {
                core.info(`Updated existing PR: ${existing[0].html_url}`);
              }
            }

      - name: Summarize generated preview changes
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## PR Build Preview"
            echo
            if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
              echo "Generated files changed during this run:"
              echo
              echo '```text'
              git diff --staged --name-status -- js/data.js README.md apps
              echo '```'
            else
              echo "No generated file changes were detected during this run."
            fi
            echo
            echo "The built site artifact for this PR is uploaded in the workflow run artifacts."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Re-checkout after API commit
        if: github.event_name != 'pull_request' && steps.changes.outputs.changed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
          persist-credentials: false

      - name: Apply cache-busting asset versions
        run: |
          python - <<'PY'
          import subprocess
          from pathlib import Path

          version = subprocess.check_output(
              ["git", "rev-parse", "--short", "HEAD"],
              text=True,
          ).strip()
          path = Path("index.html")
          content = path.read_text(encoding="utf-8")
          replacements = {
              'href="css/style.css"': f'href="css/style.css?v={version}"',
              'src="js/data.js"': f'src="js/data.js?v={version}"',
              'src="js/app.js"': f'src="js/app.js?v={version}"',
          }

          for old, new in replacements.items():
              if old not in content:
                  raise SystemExit(f"Expected asset reference not found: {old}")
              content = content.replace(old, new)

          path.write_text(content, encoding="utf-8")
          PY

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: '.'

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
