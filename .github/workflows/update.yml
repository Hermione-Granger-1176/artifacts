name: Update Artifacts & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONPATH: '.'
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '24'
  PAGES_BRANCH: gh-pages
  PREVIEW_ROOT: pr-preview
  PREVIEW_COMMENT_HEADER: pr-preview
  VERIFY_DEPLOY_ATTEMPTS: '18'
  VERIFY_DEPLOY_DELAY_SECONDS: '10'
  ARTIFACTS_STRICT_THUMBNAILS: '1'
  GENERATED_OUTPUT_ARGS: js/data.js js/gallery-config.js README.md apps

jobs:
  # Decide the only allowed automation path for this event.
  # The planner is the source of truth for browser scope, thumbnail scope,
  # and whether thumbnails may be persisted back to source branches.
  plan:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      json: ${{ steps.plan.outputs.json }}
      browser-scope: ${{ steps.plan.outputs.browser-scope }}
      changed-slugs: ${{ steps.plan.outputs.changed-slugs }}
      thumbnail-scope: ${{ steps.plan.outputs.thumbnail-scope }}
      thumbnail-slugs: ${{ steps.plan.outputs.thumbnail-slugs }}
      persist-mode: ${{ steps.plan.outputs.persist-mode }}
      reason: ${{ steps.plan.outputs.reason }}
      skip-verification: ${{ steps.plan.outputs.skip-verification }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Resolve primary app identity
        id: app-identity
        continue-on-error: true
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Compute browser and thumbnail plan
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REPO_FORK: ${{ github.event.pull_request.head.repo.fork || 'false' }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || '' }}
          ACTOR: ${{ github.actor }}
          APP_BOT_LOGIN: ${{ steps.app-identity.outputs.app-slug }}[bot]
        run: |
          plan=$(python3 scripts/ci/workflow_helpers.py thumbnail-plan \
            --event-name "${{ github.event_name }}" \
            --repo "${{ github.repository }}" \
            --pr-number "${{ github.event.pull_request.number || '' }}" \
            --commit-sha "${{ github.sha }}" \
            --head-repo-fork "$HEAD_REPO_FORK" \
            --pr-author "$PR_AUTHOR" \
            --actor "$ACTOR" \
            --app-bot-login "$APP_BOT_LOGIN")
          echo "json=$plan" >> "$GITHUB_OUTPUT"
          PLAN_JSON="$plan" python3 - <<'PY'
          import json
          import os

          plan = json.loads(os.environ["PLAN_JSON"])
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"browser-scope={plan['browser_scope']}\n")
              output.write(f"changed-slugs={','.join(plan['changed_slugs'])}\n")
              output.write(f"thumbnail-scope={plan['thumbnail_scope']}\n")
              output.write(f"thumbnail-slugs={','.join(plan['thumbnail_slugs'])}\n")
              output.write(f"persist-mode={plan['persist_mode']}\n")
              output.write(f"reason={plan['reason']}\n")
              output.write(f"skip-verification={'true' if plan['skip_verification'] else 'false'}\n")
          PY

      - name: Summarize automation plan
        env:
          PLAN_PERSIST_MODE: ${{ steps.plan.outputs.persist-mode }}
          PLAN_REASON: ${{ steps.plan.outputs.reason }}
          PLAN_SKIP_VERIFICATION: ${{ steps.plan.outputs.skip-verification }}
          PLAN_BROWSER_SCOPE: ${{ steps.plan.outputs.browser-scope }}
          PLAN_THUMBNAIL_SCOPE: ${{ steps.plan.outputs.thumbnail-scope }}
          PLAN_CHANGED_SLUGS: ${{ steps.plan.outputs.changed-slugs }}
          PLAN_THUMBNAIL_SLUGS: ${{ steps.plan.outputs.thumbnail-slugs }}
        run: |
          {
            echo "## Automation plan"
            echo
            echo "Persist mode: $PLAN_PERSIST_MODE"
            echo "Reason: $PLAN_REASON"
            echo "Skip verification: $PLAN_SKIP_VERIFICATION"
            echo "Browser scope: $PLAN_BROWSER_SCOPE"
            echo "Thumbnail scope: $PLAN_THUMBNAIL_SCOPE"
            echo "Changed slugs: ${PLAN_CHANGED_SLUGS:-none}"
            echo "Thumbnail slugs: ${PLAN_THUMBNAIL_SLUGS:-none}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Build and verify once. This is the only job allowed to run the expensive
  # thumbnail generation path. Later jobs must reuse the verified artifacts.
  # Skipped when the planner detects an automated thumbnail-only commit
  # (trusted app bot actor + exclusively thumbnail files in the commit).
  verify:
    if: >-
      github.event.action != 'closed' &&
      needs.plan.outputs.skip-verification != 'true'
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    outputs:
      thumbnail-artifact-name: ${{ steps.thumbnail-artifact.outputs.artifact-name }}
      thumbnail-artifact-changed: ${{ steps.thumbnail-artifact.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install workspace dependencies
        run: make setup-ci

      - name: Run fast repository gate
        run: make COVERAGE_OUTPUT=js-coverage.txt check-local

      - name: Invalidate thumbnails for targeted runtime changes
        if: needs.plan.outputs.thumbnail-scope != 'none'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/ci/workflow_helpers.py invalidate-thumbnails
          --event-name "${{ github.event_name }}"
          --repo "${{ github.repository }}"
          --pr-number "${{ github.event.pull_request.number || '' }}"
          --commit-sha "${{ github.sha }}"

      - name: Run root browser verification
        run: make test-browser-root

      - name: Run selective app browser verification
        if: needs.plan.outputs.browser-scope != 'none'
        env:
          ARTIFACTS_BROWSER_APP_SLUGS: ${{ needs.plan.outputs.browser-scope == 'changed' && needs.plan.outputs.changed-slugs || '' }}
        run: make test-browser-apps

      - name: Build verified site and thumbnails
        env:
          ARTIFACTS_THUMBNAIL_SLUGS: ${{ needs.plan.outputs.thumbnail-scope == 'changed' && needs.plan.outputs.thumbnail-slugs || '' }}
          ARTIFACTS_THUMBNAIL_MANIFEST: .artifacts/thumbnail-persist/manifest.json
        run: |
          make thumbnails
          make index
          make site

      - name: Package thumbnail persistence artifact
        id: thumbnail-artifact
        if: needs.plan.outputs.persist-mode != 'none'
        env:
          PLAN_JSON: ${{ needs.plan.outputs.json }}
        run: |
          root=.artifacts/thumbnail-persist
          rm -rf "$root"
          mkdir -p "$root"
          printf '%s' "$PLAN_JSON" > "$root/plan.json"

          mapfile -t thumb_files < <((git diff --name-only -- 'apps/*/thumbnail.webp'; git ls-files --others --exclude-standard -- 'apps/*/thumbnail.webp') | awk 'NF' | sort -u)

          if [ "${#thumb_files[@]}" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "artifact-name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for rel_path in "${thumb_files[@]}"; do
            mkdir -p "$root/$(dirname "$rel_path")"
            cp "$rel_path" "$root/$rel_path"
          done

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "artifact-name=thumbnail-persist-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Upload verified site artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: site-${{ github.run_id }}
          path: _site
          if-no-files-found: error
          overwrite: true

      - name: Upload thumbnail persistence artifact
        if: steps.thumbnail-artifact.outputs.changed == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ steps.thumbnail-artifact.outputs.artifact-name }}
          path: .artifacts/thumbnail-persist
          if-no-files-found: error
          overwrite: true
          retention-days: 1

      - name: Report JavaScript coverage
        if: always()
        run: |
          if [ ! -f js-coverage.txt ]; then
            {
              echo "## JavaScript Coverage"
              echo
              echo "Coverage output was not generated because the fast local gate did not complete successfully."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python - <<'PY'
          import os
          from pathlib import Path

          report = Path("js-coverage.txt").read_text(encoding="utf-8")
          start_marker = "ℹ start of coverage report"
          end_marker = "ℹ end of coverage report"
          start = report.find(start_marker)
          end = report.find(end_marker)
          if start == -1 or end == -1:
              raise SystemExit("Coverage report markers not found in js-coverage.txt")
          snippet = report[start : end + len(end_marker)]
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as summary:
              summary.write("## JavaScript Coverage\n\n```text\n")
              summary.write(snippet)
              summary.write("\n```\n")
          PY

      - name: Summarize verification
        if: always()
        run: |
          {
            echo "## Verify"
            echo
            echo "Generated changes detected during the build:"
            echo
            echo '```text'
            git status --short -- ${GENERATED_OUTPUT_ARGS} || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  secret-scan:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  dependency-review:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4

  # Publish only the verified `_site` artifact. This job never regenerates
  # thumbnails or mutates source branches.
  # Skipped alongside verify when the planner detects an automated
  # thumbnail-only commit — the site was already deployed by the prior run.
  publish:
    if: >-
      github.event.action != 'closed' &&
      needs.plan.outputs.skip-verification != 'true' &&
      !failure() && !cancelled() &&
      needs.verify.result == 'success' &&
      needs.secret-scan.result == 'success' &&
      (needs.dependency-review.result == 'success' || needs.dependency-review.result == 'skipped')
    needs:
      - plan
      - verify
      - secret-scan
      - dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: CI setup
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          head-repo-fork: ${{ github.event.pull_request.head.repo.fork || 'false' }}
          pr-author: ${{ github.event.pull_request.user.login || '' }}
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          escalation-app-id: ${{ vars.ESCALATION_APP_ID }}
          escalation-app-private-key: ${{ secrets.ESCALATION_APP_PRIVATE_KEY }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Download verified site artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: site-${{ github.run_id }}
          path: _site

      - name: Install dependencies for live browser verification
        if: steps.setup.outputs.token-available == 'true'
        run: make setup-ci

      - name: Resolve deployed asset marker
        id: deploy-version
        run: echo "short-sha=$(printf '%s' "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Resolve preview URL
        if: github.event_name == 'pull_request'
        id: preview-url
        run: |
          site_url=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['artifacts']['site_url'].rstrip('/'))")
          echo "url=${site_url}/${{ env.PREVIEW_ROOT }}/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"

      - name: Deploy PR preview
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available == 'true'
        env:
          GH_TOKEN: ${{ steps.setup.outputs.escalation-token }}
          PAGES_BRANCH: ${{ env.PAGES_BRANCH }}
          PREVIEW_ROOT: ${{ env.PREVIEW_ROOT }}
          COMMIT_MESSAGE: Deploy preview for PR ${{ github.event.pull_request.number }}
          DEPLOY_DIR: _site
          DEPLOY_SUBDIR: ${{ env.PREVIEW_ROOT }}/pr-${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node ./.github/actions/deploy-site/deploy-verified.mjs

      - name: Post PR preview link
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available == 'true'
        uses: marocchino/sticky-pull-request-comment@d4d6b0936434b21bc8345ad45a440c5f7d2c40ff # v3
        with:
          header: ${{ env.PREVIEW_COMMENT_HEADER }}
          recreate: true
          message: |
            CI preview

            Preview URL: ${{ steps.preview-url.outputs.url }}

      - name: Verify PR preview deployment
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available == 'true'
        run: >-
          python3 scripts/ci/verify_deploy.py
          --url "${{ steps.preview-url.outputs.url }}"
          --expected-substring "js/app.js?v=${{ steps.deploy-version.outputs.short-sha }}"
          --expected-commit-sha "${{ github.sha }}"
          --attempts ${{ env.VERIFY_DEPLOY_ATTEMPTS }}
          --delay-seconds ${{ env.VERIFY_DEPLOY_DELAY_SECONDS }}

      - name: Run PR preview browser verification
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available == 'true'
        env:
          ARTIFACTS_LIVE_SITE_URL: ${{ steps.preview-url.outputs.url }}
          ARTIFACTS_BROWSER_ARTIFACT_DIR: .artifacts/browser-live/pr-preview
        run: make test-browser-live

      - name: Note limited PR preview
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available != 'true'
        run: |
          {
            echo "## PR Preview"
            echo
            echo "Preview deployment is skipped because the app token is unavailable (fork or Dependabot PR)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy main site
        if: github.event_name != 'pull_request' && steps.setup.outputs.token-available == 'true'
        uses: ./.github/actions/deploy-site
        with:
          token: ${{ steps.setup.outputs.escalation-token }}
          pages-branch: ${{ env.PAGES_BRANCH }}
          preview-root: ${{ env.PREVIEW_ROOT }}
          commit-sha: ${{ github.sha }}
          skip-build: 'true'
          verify-attempts: ${{ env.VERIFY_DEPLOY_ATTEMPTS }}
          verify-delay-seconds: ${{ env.VERIFY_DEPLOY_DELAY_SECONDS }}

      - name: Resolve live site URL
        if: github.event_name != 'pull_request'
        id: live-site-url
        run: |
          site_url=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['artifacts']['site_url'])")
          echo "url=${site_url}" >> "$GITHUB_OUTPUT"

      - name: Run live main site browser verification
        if: github.event_name != 'pull_request' && steps.setup.outputs.token-available == 'true'
        env:
          ARTIFACTS_LIVE_SITE_URL: ${{ steps.live-site-url.outputs.url }}
          ARTIFACTS_BROWSER_ARTIFACT_DIR: .artifacts/browser-live/main-site
        run: make test-browser-live

      - name: Summarize publish
        if: always()
        run: |
          {
            echo "## Publish"
            echo
            echo "Persist mode: ${{ needs.plan.outputs.persist-mode }}"
            echo "Reason: ${{ needs.plan.outputs.reason }}"
            echo "Verified artifact: site-${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload live browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: live-browser-artifacts-${{ github.run_id }}
          path: .artifacts/browser-live
          if-no-files-found: ignore
          overwrite: true

  # Persist thumbnails only when the planner explicitly allows it.
  # This job never regenerates thumbnails. It only applies the validated
  # thumbnail artifact built by `verify`.
  persist-thumbnails:
    if: >-
      github.event.action != 'closed' &&
      needs.plan.outputs.persist-mode != 'none' &&
      needs.verify.outputs.thumbnail-artifact-changed == 'true' &&
      needs.publish.result == 'success'
    needs:
      - plan
      - verify
      - publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: CI setup
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          head-repo-fork: ${{ github.event.pull_request.head.repo.fork || 'false' }}
          pr-author: ${{ github.event.pull_request.user.login || '' }}
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          escalation-app-id: ${{ vars.ESCALATION_APP_ID }}
          escalation-app-private-key: ${{ secrets.ESCALATION_APP_PRIVATE_KEY }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Download thumbnail persistence artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.verify.outputs.thumbnail-artifact-name }}
          path: .artifacts/thumbnail-persist

      - name: Validate thumbnail artifact
        id: validate-artifact
        run: |
          plan=$(python3 scripts/ci/workflow_helpers.py validate-thumbnail-artifact --root .artifacts/thumbnail-persist)
          echo "json=$plan" >> "$GITHUB_OUTPUT"

      - name: Revalidate PR head state before branch writeback
        if: needs.plan.outputs.persist-mode == 'pr-branch'
        id: pr-head-state
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          current_sha=$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)
          current_ref=$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName)
          if [ "$current_sha" != "$PR_HEAD_SHA" ] || [ "$current_ref" != "$PR_HEAD_REF" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "stale=false" >> "$GITHUB_OUTPUT"

      - name: Apply thumbnail artifact and stage exact files
        id: stage-thumbnails
        if: needs.plan.outputs.persist-mode != 'pr-branch' || steps.pr-head-state.outputs.stale != 'true'
        run: |
          mapfile -t artifact_files < <(find .artifacts/thumbnail-persist/apps -type f -name 'thumbnail.webp' | sort)
          if [ "${#artifact_files[@]}" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "pathspec=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pathspec_file=.artifacts/thumbnail-pathspec.txt
          : > "$pathspec_file"

          for source in "${artifact_files[@]}"; do
            target=${source#.artifacts/thumbnail-persist/}
            mkdir -p "$(dirname "$target")"
            cp "$source" "$target"
            git add "$target"
            printf '%s\n' "$target" >> "$pathspec_file"
          done

          echo "changed=true" >> "$GITHUB_OUTPUT"
          {
            echo 'pathspec<<EOF'
            cat "$pathspec_file"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Persist thumbnails into the same PR branch
        if: >-
          needs.plan.outputs.persist-mode == 'pr-branch' &&
          steps.pr-head-state.outputs.stale != 'true' &&
          steps.stage-thumbnails.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ steps.setup.outputs.app-token }}
          base-branch: ${{ github.event.pull_request.head.ref }}
          expected-head-sha: ${{ github.event.pull_request.head.sha }}
          commit-headline: "Save generated app thumbnails"
          fallback-branch-prefix: ci/save-generated-thumbnails
          pr-title: "Save generated app thumbnails"
          pr-body: |
            ## Summary
            - Type: CI asset maintenance
            - Save generated `thumbnail.webp` files back to the current PR branch
          pathspec: ${{ steps.stage-thumbnails.outputs.pathspec }}
          commit-mode: direct

      - name: Create or update thumbnail follow-up PR
        if: >-
          needs.plan.outputs.persist-mode == 'followup-pr' &&
          steps.stage-thumbnails.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ steps.setup.outputs.escalation-token }}
          base-branch: ${{ github.event.repository.default_branch }}
          expected-head-sha: ${{ github.sha }}
          commit-headline: "Save generated app thumbnails"
          fallback-branch-prefix: ci/save-generated-thumbnails
          pr-title: "Save generated app thumbnails"
          pr-body: |
            <!-- artifacts:generated-thumbnails -->

            ## Summary
            - Type: CI asset maintenance
            - Save generated `thumbnail.webp` files back to the source repository
            - Keep merged branches aligned with the deployed preview and production site assets
          pathspec: ${{ steps.stage-thumbnails.outputs.pathspec }}
          commit-mode: force-pr

      - name: Summarize thumbnail persistence
        if: always()
        run: |
          {
            echo "## Thumbnail persistence"
            echo
            echo "Persist mode: ${{ needs.plan.outputs.persist-mode }}"
            echo "Reason: ${{ needs.plan.outputs.reason }}"
            echo "Artifact changed: ${{ needs.verify.outputs.thumbnail-artifact-changed }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Preview cleanup is isolated from publish/persistence. Closing or merging a PR
  # removes only that PR's preview subtree and preview comment.
  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: CI setup
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: pull_request
          head-repo-fork: ${{ github.event.pull_request.head.repo.fork }}
          pr-author: ${{ github.event.pull_request.user.login }}
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          escalation-app-id: ${{ vars.ESCALATION_APP_ID }}
          escalation-app-private-key: ${{ secrets.ESCALATION_APP_PRIVATE_KEY }}

      - name: Remove PR preview deployment
        if: steps.setup.outputs.token-available == 'true'
        env:
          GH_TOKEN: ${{ steps.setup.outputs.escalation-token }}
          PAGES_BRANCH: ${{ env.PAGES_BRANCH }}
          PREVIEW_ROOT: ${{ env.PREVIEW_ROOT }}
          COMMIT_MESSAGE: Remove preview for PR ${{ github.event.pull_request.number }}
          REMOVE_SUBDIR: ${{ env.PREVIEW_ROOT }}/pr-${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node ./.github/actions/deploy-site/deploy-verified.mjs

      - name: Remove PR preview link comment
        if: steps.setup.outputs.token-available == 'true'
        uses: marocchino/sticky-pull-request-comment@d4d6b0936434b21bc8345ad45a440c5f7d2c40ff # v3
        with:
          header: ${{ env.PREVIEW_COMMENT_HEADER }}
          delete: true
