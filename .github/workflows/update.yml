name: Update Artifacts & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '24'
  PAGES_BRANCH: gh-pages
  PREVIEW_ROOT: pr-preview
  PREVIEW_COMMENT_HEADER: pr-preview
  VERIFY_DEPLOY_ATTEMPTS: '18'
  VERIFY_DEPLOY_DELAY_SECONDS: '10'
  ARTIFACTS_STRICT_THUMBNAILS: '1'
  GENERATED_OUTPUT_ARGS: js/data.js js/gallery-config.js README.md apps

jobs:
  verify:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install workspace dependencies
        run: make setup-ci

      - name: Invalidate thumbnails for changed apps
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          python3 scripts/workflow_helpers.py invalidate-thumbnails
          --event-name "${{ github.event_name }}"
          --repo "${{ github.repository }}"
          --pr-number "${{ github.event.pull_request.number || '' }}"
          --commit-sha "${{ github.sha }}"

      - name: Run full repository check
        run: make COVERAGE_OUTPUT=js-coverage.txt check

      - name: Upload verified site artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: site-${{ github.run_id }}-${{ github.run_attempt }}
          path: _site
          if-no-files-found: error

      - name: Report JavaScript coverage
        if: always()
        run: |
          if [ ! -f js-coverage.txt ]; then
            {
              echo "## JavaScript Coverage"
              echo
              echo "Coverage output was not generated because `make check` did not complete successfully."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          python - <<'PY'
          import os
          from pathlib import Path

          report = Path("js-coverage.txt").read_text(encoding="utf-8")
          start_marker = "ℹ start of coverage report"
          end_marker = "ℹ end of coverage report"
          start = report.find(start_marker)
          end = report.find(end_marker)
          if start == -1 or end == -1:
              raise SystemExit("Coverage report markers not found in js-coverage.txt")
          snippet = report[start : end + len(end_marker)]
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as summary:
              summary.write("## JavaScript Coverage\n\n```text\n")
              summary.write(snippet)
              summary.write("\n```\n")
          PY

      - name: Summarize verification
        if: always()
        run: |
          {
            echo "## Verify"
            echo
            echo "Generated changes detected during \`make check\`:"
            echo
            echo '```text'
            git status --short -- ${GENERATED_OUTPUT_ARGS} || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize verify failure
        if: failure()
        run: |
          {
            echo "## Verify failed"
            echo
            echo "The strict repository gate failed before publish."
            echo
            echo "Recommended local command: \`make check\`"
            echo "Inspect the failed step in this run for the exact command and error output."
          } >> "$GITHUB_STEP_SUMMARY"

  secret-scan:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  dependency-review:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4

  publish:
    if: >-
      github.event.action != 'closed' &&
      !failure() && !cancelled() &&
      needs.verify.result == 'success' &&
      needs.secret-scan.result == 'success' &&
      (needs.dependency-review.result == 'success' || needs.dependency-review.result == 'skipped')
    needs:
      - verify
      - secret-scan
      - dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: CI setup
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          head-repo-fork: ${{ github.event.pull_request.head.repo.fork || 'false' }}
          pr-author: ${{ github.event.pull_request.user.login || '' }}
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          escalation-app-id: ${{ vars.ESCALATION_APP_ID }}
          escalation-app-private-key: ${{ secrets.ESCALATION_APP_PRIVATE_KEY }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Download verified site artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: site-${{ github.run_id }}-${{ github.run_attempt }}
          path: _site

      - name: Detect generated changes
        id: changes
        run: |
          if [ -n "$(git status --short -- ${GENERATED_OUTPUT_ARGS})" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summarize generated workspace changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          {
            echo "## Generated workspace changes"
            echo
            echo "CI rebuilt generated content for this run. The publish workflow deploys these changes from the verified workspace build without mutating the source branch."
            echo
            echo '```text'
            git status --short -- ${GENERATED_OUTPUT_ARGS} || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve deployed asset marker
        id: deploy-version
        run: echo "short-sha=$(printf '%s' "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Resolve preview URL
        if: github.event_name == 'pull_request'
        id: preview-url
        run: |
          site_url=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['artifacts']['site_url'].rstrip('/'))")
          echo "url=${site_url}/${{ env.PREVIEW_ROOT }}/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"

      - name: Deploy PR preview
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available == 'true'
        env:
          GH_TOKEN: ${{ steps.setup.outputs.escalation-token }}
          PAGES_BRANCH: ${{ env.PAGES_BRANCH }}
          PREVIEW_ROOT: ${{ env.PREVIEW_ROOT }}
          COMMIT_MESSAGE: Deploy preview for PR ${{ github.event.pull_request.number }}
          DEPLOY_DIR: _site
          DEPLOY_SUBDIR: ${{ env.PREVIEW_ROOT }}/pr-${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node ./.github/actions/deploy-site/deploy-verified.mjs

      - name: Post PR preview link
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available == 'true'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3
        with:
          header: ${{ env.PREVIEW_COMMENT_HEADER }}
          recreate: true
          message: |
            CI preview

            Preview URL: ${{ steps.preview-url.outputs.url }}

      - name: Verify PR preview deployment
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available == 'true'
        run: >-
          python3 scripts/verify_deploy.py
          --url "${{ steps.preview-url.outputs.url }}"
          --expected-substring "js/app.js?v=${{ steps.deploy-version.outputs.short-sha }}"
          --expected-commit-sha "${{ github.sha }}"
          --attempts ${{ env.VERIFY_DEPLOY_ATTEMPTS }}
          --delay-seconds ${{ env.VERIFY_DEPLOY_DELAY_SECONDS }}

      - name: Summarize PR preview
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available == 'true'
        run: |
          {
            echo "## PR Preview"
            echo
            echo "Preview URL: ${{ steps.preview-url.outputs.url }}"
            echo "Built from verified artifact: site-${{ github.run_id }}-${{ github.run_attempt }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Note limited PR preview
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available != 'true'
        run: |
          {
            echo "## PR Preview"
            echo
            echo "Preview deployment is skipped because the app token is unavailable (fork or Dependabot PR)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy main site
        id: main-deploy
        if: >-
          github.event_name != 'pull_request' &&
          steps.setup.outputs.token-available == 'true'
        uses: ./.github/actions/deploy-site
        with:
          token: ${{ steps.setup.outputs.escalation-token }}
          pages-branch: ${{ env.PAGES_BRANCH }}
          preview-root: ${{ env.PREVIEW_ROOT }}
          commit-sha: ${{ github.sha }}
          skip-build: 'true'
          verify-attempts: ${{ env.VERIFY_DEPLOY_ATTEMPTS }}
          verify-delay-seconds: ${{ env.VERIFY_DEPLOY_DELAY_SECONDS }}

      - name: Summarize publish
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "## Publish"
            echo
            echo "Deploy version: ${{ github.sha }}"
            echo "Generated files changed: ${{ steps.changes.outputs.changed }}"
            echo "Verified artifact: site-${{ github.run_id }}-${{ github.run_attempt }}"
            echo "Published URL verified: yes"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize publish failure
        if: failure()
        run: |
          {
            echo "## Publish failed"
            echo
            echo "The verified site artifact was not published successfully."
            echo
            echo "Recommended local command: \`make check\`"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "Preview deploys also require trusted app tokens and a healthy GitHub Pages publish path."
              if [ -n "${{ steps.preview-url.outputs.url }}" ]; then
                echo "Preview URL (if created): ${{ steps.preview-url.outputs.url }}"
              fi
            else
              echo "Inspect deploy verification and GitHub Pages settings if the build artifact looked correct."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: CI setup
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: pull_request
          head-repo-fork: ${{ github.event.pull_request.head.repo.fork }}
          pr-author: ${{ github.event.pull_request.user.login }}
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          escalation-app-id: ${{ vars.ESCALATION_APP_ID }}
          escalation-app-private-key: ${{ secrets.ESCALATION_APP_PRIVATE_KEY }}

      - name: Remove PR preview deployment
        if: steps.setup.outputs.token-available == 'true'
        env:
          GH_TOKEN: ${{ steps.setup.outputs.escalation-token }}
          PAGES_BRANCH: ${{ env.PAGES_BRANCH }}
          PREVIEW_ROOT: ${{ env.PREVIEW_ROOT }}
          COMMIT_MESSAGE: Remove preview for PR ${{ github.event.pull_request.number }}
          REMOVE_SUBDIR: ${{ env.PREVIEW_ROOT }}/pr-${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node ./.github/actions/deploy-site/deploy-verified.mjs

      - name: Remove PR preview link comment
        if: steps.setup.outputs.token-available == 'true'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3
        with:
          header: ${{ env.PREVIEW_COMMENT_HEADER }}
          delete: true
