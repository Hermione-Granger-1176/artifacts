name: Update Artifacts & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: npm

      - name: Install workspace dependencies
        run: make setup-ci

      - name: Lint workspace code
        run: make lint

      - name: Run workspace tests
        env:
          ARTIFACTS_REQUIRE_BROWSER_TESTS: '1'
        run: make test

      - name: Report JavaScript coverage
        run: |
          set -o pipefail
          make coverage-js | tee js-coverage.txt
          python - <<'PY'
          import os
          from pathlib import Path

          report = Path("js-coverage.txt").read_text(encoding="utf-8")
          start_marker = "ℹ start of coverage report"
          end_marker = "ℹ end of coverage report"
          start = report.find(start_marker)
          end = report.find(end_marker)
          if start == -1 or end == -1:
              raise SystemExit("Coverage report markers not found in js-coverage.txt")
          snippet = report[start : end + len(end_marker)]
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as summary:
              summary.write("## JavaScript Coverage\n\n```text\n")
              summary.write(snippet)
              summary.write("\n```\n")
          PY

      - name: Validate artifact directories
        run: make validate

      - name: Run practical dependency audits
        run: make security

      - name: Generate thumbnails
        env:
          ARTIFACTS_STRICT_THUMBNAILS: '1'
        run: make thumbnails

      - name: Generate content index
        run: make index

      - name: Prepare deployable site
        run: make site

      - name: Summarize verification
        run: |
          {
            echo "## Verification"
            echo
            echo "Completed lint, tests, validation, security audit, generation, and site assembly."
            echo
            echo "Generated file changes during verification:"
            echo
            echo '```text'
            git diff --name-status -- js/data.js js/gallery-config.js README.md apps || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  secret-scan:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        continue-on-error: ${{ !github.event.repository.private }}

  publish:
    if: >-
      github.event.action != 'closed' &&
      !failure() && !cancelled() &&
      needs.verify.result == 'success' &&
      needs.secret-scan.result == 'success' &&
      (needs.dependency-review.result == 'success' || needs.dependency-review.result == 'skipped')
    needs:
      - verify
      - secret-scan
      - dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Determine whether app-token actions are allowed
        id: token-policy
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ] || [ "${{ github.event.pull_request.user.login }}" = "dependabot[bot]" ]; then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "allowed=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app-token
        if: steps.token-policy.outputs.allowed == 'true'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check GitHub App token availability
        id: token-status
        run: |
          if [ -n "${{ steps.app-token.outputs.token }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if a trusted run cannot mint the app token
        if: steps.token-policy.outputs.allowed == 'true' && steps.token-status.outputs.available != 'true'
        run: |
          echo "Expected a GitHub App token for this run, but token creation did not succeed." >&2
          exit 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'
          cache: npm

      - name: Install workspace dependencies
        run: make setup-ci

      - name: Generate thumbnails
        env:
          ARTIFACTS_STRICT_THUMBNAILS: '1'
        run: make thumbnails

      - name: Generate content index
        run: make index

      - name: Detect generated changes
        id: changes
        run: |
          git add -A js/data.js js/gallery-config.js README.md apps
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated files (verified)
        if: github.event_name != 'pull_request' && steps.changes.outputs.changed == 'true' && steps.token-status.outputs.available == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          base-branch: ${{ github.ref_name }}
          expected-head-sha: ${{ github.sha }}
          commit-headline: "Update generated artifacts [skip ci]"
          fallback-branch-prefix: auto/update-artifacts
          pr-title: "Update generated artifacts"
          pr-body: |
            ## Summary
            - Type: CI automation
            - Update generated artifacts from the `update.yml` workflow
            - Direct commit to the default branch was blocked by branch protection
          pathspec: |
            js/data.js
            js/gallery-config.js
            README.md
            apps

      - name: Re-checkout after API commit
        if: github.event_name != 'pull_request' && steps.changes.outputs.changed == 'true' && steps.token-status.outputs.available == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare deployable site
        run: make site

      - name: Resolve deployed asset marker
        id: deploy-version
        run: echo "short-sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy PR preview
        if: github.event_name == 'pull_request' && steps.token-status.outputs.available == 'true'
        id: preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: _site
          preview-branch: gh-pages
          token: ${{ steps.app-token.outputs.token }}
          comment: false
          qr-code: false

      - name: Post PR preview link
        if: github.event_name == 'pull_request' && steps.token-status.outputs.available == 'true'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3
        with:
          header: pr-preview
          recreate: true
          message: |
            CI preview

            Preview URL: ${{ steps.preview.outputs.preview-url }}

      - name: Verify PR preview deployment
        if: github.event_name == 'pull_request' && steps.token-status.outputs.available == 'true'
        run: >-
          .venv/bin/python scripts/verify_deploy.py
          --url "${{ steps.preview.outputs.preview-url }}"
          --expected-substring "js/app.js?v=${{ steps.deploy-version.outputs.short-sha }}"
          --attempts 18
          --delay-seconds 10

      - name: Summarize PR preview
        if: github.event_name == 'pull_request' && steps.token-status.outputs.available == 'true'
        run: |
          {
            echo "## PR Preview"
            echo
            echo "Preview URL: ${{ steps.preview.outputs.preview-url }}"
            echo
            echo "Generated changes staged for this run:"
            echo
            echo '```text'
            git diff --staged --name-status -- js/data.js js/gallery-config.js README.md apps || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Note limited PR preview
        if: github.event_name == 'pull_request' && steps.token-status.outputs.available != 'true'
        run: |
          {
            echo "## PR Preview"
            echo
            echo "Preview deployment is skipped because the app token is unavailable (fork or Dependabot PR)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy main site to gh-pages
        if: github.event_name != 'pull_request' && steps.token-status.outputs.available == 'true'
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: gh-pages
          folder: _site
          token: ${{ steps.app-token.outputs.token }}
          clean-exclude: |
            pr-preview/
          force: false
          commit-message: Deploy site for ${{ github.sha }}

      - name: Verify published site
        if: github.event_name != 'pull_request' && steps.token-status.outputs.available == 'true'
        run: >-
          .venv/bin/python scripts/verify_deploy.py
          --expected-substring "js/app.js?v=${{ steps.deploy-version.outputs.short-sha }}"
          --attempts 18
          --delay-seconds 10

      - name: Summarize publish
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "## Publish"
            echo
            echo "Deploy version: ${{ github.sha }}"
            echo "Generated files changed: ${{ steps.changes.outputs.changed }}"
            echo "Published URL verified: yes"
          } >> "$GITHUB_STEP_SUMMARY"

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Determine whether app-token actions are allowed
        id: token-policy
        run: |
          if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ] || [ "${{ github.event.pull_request.user.login }}" = "dependabot[bot]" ]; then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "allowed=true" >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app-token
        if: steps.token-policy.outputs.allowed == 'true'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Ensure preview workspace exists
        if: steps.token-policy.outputs.allowed == 'true'
        run: mkdir -p _site

      - name: Remove PR preview deployment
        if: steps.token-policy.outputs.allowed == 'true'
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: _site
          preview-branch: gh-pages
          token: ${{ steps.app-token.outputs.token }}
          comment: false
          qr-code: false

      - name: Remove PR preview link comment
        if: steps.token-policy.outputs.allowed == 'true'
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3
        with:
          header: pr-preview
          delete: true
