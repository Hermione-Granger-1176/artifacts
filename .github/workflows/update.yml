name: Update Artifacts & Deploy

on:
  workflow_dispatch:
    inputs:
      full-sweep:
        description: Force a conservative full verification sweep.
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "23 4 * * 0"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONPATH: "."
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "24"
  PAGES_BRANCH: gh-pages
  PAGES_DEPLOY_TIMEOUT_MS: "240000"
  PAGES_PUBLISH_DIR: .artifacts/pages-publish
  PREVIEW_ROOT: pr-preview
  PREVIEW_COMMENT_HEADER: pr-preview
  VERIFY_DEPLOY_ATTEMPTS: "12"
  VERIFY_DEPLOY_DELAY_SECONDS: "5"
  ARTIFACTS_STRICT_THUMBNAILS: "1"
  GENERATED_OUTPUT_ARGS: js/data.js js/gallery-config.js README.md apps

jobs:
  # The plan carries full slug lists only in its artifact. Job outputs remain
  # small so GitHub Actions output limits cannot truncate large app changes.
  plan:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      browser-scope: ${{ steps.plan.outputs.browser-scope }}
      thumbnail-scope: ${{ steps.plan.outputs.thumbnail-scope }}
      shard-matrix: ${{ steps.plan.outputs.shard-matrix }}
      shard-count: ${{ steps.plan.outputs.shard-count }}
      persist-mode: ${{ steps.plan.outputs.persist-mode }}
      reason: ${{ steps.plan.outputs.reason }}
      skip-verification: ${{ steps.plan.outputs.skip-verification }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Resolve primary app identity
        id: app-identity
        continue-on-error: true
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Restore main verification ledger
        id: app-ledger
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .artifacts/app-ledger/ledger.json
          key: app-ledger-${{ github.sha }}
          restore-keys: |
            app-ledger-

      - name: Compute app impact plan
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REPO_FORK: ${{ github.event.pull_request.head.repo.fork || 'false' }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || '' }}
          ACTOR: ${{ github.actor }}
          APP_BOT_LOGIN: ${{ steps.app-identity.outputs.app-slug && format('{0}[bot]', steps.app-identity.outputs.app-slug) || '' }}
        run: |
          base_sha="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          head_sha="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          plan=$(make ci-thumbnail-plan \
            event_name="${{ github.event_name }}" \
            repo="${{ github.repository }}" \
            pr_number="${{ github.event.pull_request.number || '' }}" \
            commit_sha="$head_sha" \
            base_sha="$base_sha" \
            head_sha="$head_sha" \
            head_repo_fork="$HEAD_REPO_FORK" \
            pr_author="$PR_AUTHOR" \
            actor="$ACTOR" \
            app_bot_login="$APP_BOT_LOGIN" \
            force_full="${{ github.event_name == 'schedule' || inputs.full-sweep == true || inputs.full-sweep == 'true' }}")
          mkdir -p .artifacts/ci-plan
          printf '%s' "$plan" > .artifacts/ci-plan/plan.json
          make ci-apply-app-ledger \
            plan=.artifacts/ci-plan/plan.json \
            ledger=.artifacts/app-ledger/ledger.json \
            output=.artifacts/ci-plan/memoized-plan.json
          mv .artifacts/ci-plan/memoized-plan.json .artifacts/ci-plan/plan.json
          plan=$(cat .artifacts/ci-plan/plan.json)
          PLAN_JSON="$plan" make ci-plan-outputs >> "$GITHUB_OUTPUT"

      - name: Upload app impact plan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-plan-${{ github.run_id }}
          path: .artifacts/ci-plan/plan.json
          if-no-files-found: error
          overwrite: true
          retention-days: 1

      - name: Summarize automation plan
        env:
          PLAN_PERSIST_MODE: ${{ steps.plan.outputs.persist-mode }}
          PLAN_REASON: ${{ steps.plan.outputs.reason }}
          PLAN_SKIP_VERIFICATION: ${{ steps.plan.outputs.skip-verification }}
          PLAN_BROWSER_SCOPE: ${{ steps.plan.outputs.browser-scope }}
          PLAN_THUMBNAIL_SCOPE: ${{ steps.plan.outputs.thumbnail-scope }}
          PLAN_SHARD_COUNT: ${{ steps.plan.outputs.shard-count }}
        run: |
          {
            echo "## Automation plan"
            echo
            echo "Persist mode: $PLAN_PERSIST_MODE"
            echo "Reason: $PLAN_REASON"
            echo "Skip verification: $PLAN_SKIP_VERIFICATION"
            echo "Browser scope: $PLAN_BROWSER_SCOPE"
            echo "Thumbnail scope: $PLAN_THUMBNAIL_SCOPE"
            echo "Shard count: $PLAN_SHARD_COUNT"
          } >> "$GITHUB_STEP_SUMMARY"

  quick-gates:
    if: >-
      github.event.action != 'closed' &&
      needs.plan.outputs.skip-verification != 'true'
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: CI setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          install-deps: "true"
          install-browsers: "false"

      - name: Run quick gates
        run: make ci-quick-gates

  heavy-checks:
    if: >-
      github.event.action != 'closed' &&
      needs.plan.outputs.skip-verification != 'true'
    needs:
      - plan
      - quick-gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: CI setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          install-deps: "true"
          install-browsers: "false"

      - name: Run heavy checks
        env:
          COVERAGE_OUTPUT: js-coverage.txt
        run: make ci-heavy-checks

      - name: Report JavaScript coverage
        if: always()
        run: |
          if [ -f js-coverage.txt ]; then
            make ci-coverage-summary report=js-coverage.txt >> "$GITHUB_STEP_SUMMARY"
          fi

  root-browser:
    if: >-
      github.event.action != 'closed' &&
      needs.plan.outputs.skip-verification != 'true'
    needs:
      - plan
      - quick-gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: CI setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          install-deps: "true"

      - name: Run root browser verification
        run: make test-browser-root

  app-shard:
    if: >-
      github.event.action != 'closed' &&
      needs.plan.outputs.skip-verification != 'true' &&
      needs.plan.outputs.shard-count != '0'
    needs:
      - plan
      - quick-gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix: ${{ fromJSON(needs.plan.outputs.shard-matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download app impact plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ci-plan-${{ github.run_id }}
          path: .artifacts/ci-plan

      - name: Write shard manifest
        run: >-
          make ci-write-shard-manifest
          plan=.artifacts/ci-plan/plan.json
          shard=${{ matrix.shard }}
          output=.artifacts/shard-manifest.json

      - name: CI setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          install-deps: "true"

      - name: Run app browser shard
        run: make test-browser-apps-shard shard_manifest=.artifacts/shard-manifest.json

      - name: Capture shard thumbnails
        run: make thumbnails-shard shard_manifest=.artifacts/shard-manifest.json

      - name: Package shard thumbnail result
        run: >-
          make ci-package-shard-result
          manifest=.artifacts/shard-manifest.json
          output=.artifacts/shard-result

      - name: Upload shard thumbnail result
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: app-shard-${{ github.run_id }}-${{ matrix.shard }}
          path: .artifacts/shard-result
          if-no-files-found: error
          overwrite: true
          retention-days: 1

  assemble-site:
    if: >-
      always() && github.event.action != 'closed' &&
      needs.plan.outputs.skip-verification != 'true' &&
      needs.quick-gates.result == 'success' &&
      needs.heavy-checks.result == 'success' &&
      needs.root-browser.result == 'success' &&
      (needs.app-shard.result == 'success' || needs.app-shard.result == 'skipped')
    needs:
      - plan
      - quick-gates
      - heavy-checks
      - root-browser
      - app-shard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      thumbnail-artifact-name: ${{ steps.thumbnail-artifact.outputs.artifact-name }}
      thumbnail-artifact-changed: ${{ steps.thumbnail-artifact.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download app impact plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ci-plan-${{ github.run_id }}
          path: .artifacts/ci-plan

      - name: Download shard thumbnail results
        if: needs.plan.outputs.shard-count != '0'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: app-shard-${{ github.run_id }}-*
          path: .artifacts/shard-results

      - name: CI setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}
          install-deps: "true"
          install-browsers: "false"

      - name: Merge shard thumbnails
        run: make ci-merge-shard-results root=.artifacts/shard-results

      - name: Build assembled site once
        run: |
          make check-generated
          make index
          make site

      - name: Package thumbnail persistence artifact
        id: thumbnail-artifact
        if: needs.plan.outputs.persist-mode != 'none'
        run: |
          root=.artifacts/thumbnail-persist
          rm -rf "$root"
          mkdir -p "$root"
          cp .artifacts/ci-plan/plan.json "$root/plan.json"

          mapfile -t thumb_files < <((git diff --name-only -- 'apps/*/thumbnail.webp'; git ls-files --others --exclude-standard -- 'apps/*/thumbnail.webp') | awk 'NF' | sort -u)

          if [ "${#thumb_files[@]}" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "artifact-name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for rel_path in "${thumb_files[@]}"; do
            mkdir -p "$root/$(dirname "$rel_path")"
            cp "$rel_path" "$root/$rel_path"
          done

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "artifact-name=thumbnail-persist-${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Upload assembled site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: site-${{ github.run_id }}
          path: _site
          if-no-files-found: error
          overwrite: true

      - name: Upload thumbnail persistence artifact
        if: steps.thumbnail-artifact.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.thumbnail-artifact.outputs.artifact-name }}
          path: .artifacts/thumbnail-persist
          if-no-files-found: error
          overwrite: true
          retention-days: 1

  # Branch protection requires this stable name. It only aggregates dependency
  # outcomes and intentionally does not run tests or build files.
  verify:
    if: >-
      always() && github.event.action != 'closed' &&
      needs.plan.outputs.skip-verification != 'true'
    needs:
      - plan
      - quick-gates
      - heavy-checks
      - root-browser
      - app-shard
      - assemble-site
      - secret-scan
      - dependency-review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Check required job results
        env:
          PLAN_RESULT: ${{ needs.plan.result }}
          QUICK_GATES_RESULT: ${{ needs.quick-gates.result }}
          HEAVY_CHECKS_RESULT: ${{ needs.heavy-checks.result }}
          ROOT_BROWSER_RESULT: ${{ needs.root-browser.result }}
          APP_SHARD_RESULT: ${{ needs.app-shard.result }}
          ASSEMBLE_RESULT: ${{ needs.assemble-site.result }}
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
        run: |
          [ "$PLAN_RESULT" = "success" ]
          [ "$QUICK_GATES_RESULT" = "success" ]
          [ "$HEAVY_CHECKS_RESULT" = "success" ]
          [ "$ROOT_BROWSER_RESULT" = "success" ]
          [ "$APP_SHARD_RESULT" = "success" ] || [ "$APP_SHARD_RESULT" = "skipped" ]
          [ "$ASSEMBLE_RESULT" = "success" ]
          [ "$SECRET_SCAN_RESULT" = "success" ]
          [ "$DEPENDENCY_REVIEW_RESULT" = "success" ] || [ "$DEPENDENCY_REVIEW_RESULT" = "skipped" ]

  # Without a status function the implicit success() considers transitively
  # skipped jobs (dependency-review on pushes) and skips this job forever.
  save-app-ledger:
    if: >-
      !cancelled() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.verify.result == 'success'
    needs:
      - plan
      - verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download app impact plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ci-plan-${{ github.run_id }}
          path: .artifacts/ci-plan

      - name: Restore verification ledger
        id: app-ledger
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .artifacts/app-ledger/ledger.json
          key: app-ledger-${{ github.sha }}
          restore-keys: |
            app-ledger-

      - name: Update main verification ledger
        run: >-
          make ci-update-app-ledger
          plan=.artifacts/ci-plan/plan.json
          ledger=.artifacts/app-ledger/ledger.json

      - name: Save verification ledger
        if: steps.app-ledger.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .artifacts/app-ledger/ledger.json
          key: app-ledger-${{ github.sha }}

  secret-scan:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  dependency-review:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4

  # Publish only the verified `_site` artifact. This job never regenerates
  # thumbnails or mutates source branches.
  # Skipped alongside verify when the planner detects an automated
  # thumbnail-only commit. The site was already deployed by the prior run.
  publish:
    if: >-
      github.event.action != 'closed' &&
      needs.plan.outputs.skip-verification != 'true' &&
      !failure() && !cancelled() &&
      needs.verify.result == 'success'
    needs:
      - plan
      - verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: pages-publish-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: write
      deployments: write
      issues: write
      pages: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: CI setup
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          head-repo-fork: ${{ github.event.pull_request.head.repo.fork || 'false' }}
          pr-author: ${{ github.event.pull_request.user.login || '' }}
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          escalation-app-id: ${{ vars.ESCALATION_APP_ID }}
          escalation-app-private-key: ${{ secrets.ESCALATION_APP_PRIVATE_KEY }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Download verified site artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: site-${{ github.run_id }}
          path: _site

      - name: Cache Playwright browsers
        if: steps.setup.outputs.token-available == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('uv.lock') }}

      - name: Install uv for live browser verification
        if: steps.setup.outputs.token-available == 'true'
        run: python -m pip install --upgrade pip uv

      - name: Install dependencies for live browser verification
        if: steps.setup.outputs.token-available == 'true'
        run: make setup-ci

      - name: Resolve deployed app asset hash
        id: deploy-version
        run: |
          hash=$(grep -oE 'src="js/app.js\?v=[0-9a-f]+"' _site/index.html | head -1 | sed -E 's/.*v=([0-9a-f]+).*/\1/')
          if [ -z "$hash" ]; then
            echo "Could not resolve the deployed js/app.js content hash." >&2
            exit 1
          fi
          echo "content-hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Resolve preview URL
        if: github.event_name == 'pull_request'
        id: preview-url
        run: |
          site_url=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['artifacts']['site_url'].rstrip('/'))")
          echo "url=${site_url}/${{ env.PREVIEW_ROOT }}/pr-${{ github.event.pull_request.number }}/" >> "$GITHUB_OUTPUT"

      - name: Deploy PR preview
        id: pr-deploy
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available == 'true'
        env:
          GH_TOKEN: ${{ steps.setup.outputs.escalation-token }}
          PAGES_BRANCH: ${{ env.PAGES_BRANCH }}
          PREVIEW_ROOT: ${{ env.PREVIEW_ROOT }}
          COMMIT_MESSAGE: Deploy preview for PR ${{ github.event.pull_request.number }}
          DEPLOY_DIR: _site
          DEPLOY_SUBDIR: ${{ env.PREVIEW_ROOT }}/pr-${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node ./.github/actions/deploy-site/deploy-verified.mjs

      - name: Deploy main site
        id: main-deploy
        if: github.event_name != 'pull_request' && steps.setup.outputs.token-available == 'true'
        uses: ./.github/actions/deploy-site
        with:
          token: ${{ steps.setup.outputs.escalation-token }}
          pages-branch: ${{ env.PAGES_BRANCH }}
          preview-root: ${{ env.PREVIEW_ROOT }}
          commit-sha: ${{ github.sha }}
          skip-build: "true"

      - name: Resolve gh-pages publish commit
        id: pages-publish
        if: steps.setup.outputs.token-available == 'true'
        env:
          PR_DEPLOY_COMMIT: ${{ steps.pr-deploy.outputs.commit-sha }}
          MAIN_DEPLOY_COMMIT: ${{ steps.main-deploy.outputs.pages-commit-sha }}
        run: |
          commit="${PR_DEPLOY_COMMIT:-$MAIN_DEPLOY_COMMIT}"
          if [ -z "$commit" ]; then
            echo "No gh-pages commit output was produced." >&2
            exit 1
          fi
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - name: Materialize GitHub Pages payload
        if: steps.setup.outputs.token-available == 'true'
        run: |
          rm -rf "$PAGES_PUBLISH_DIR"
          mkdir -p "$PAGES_PUBLISH_DIR"

          git fetch --depth=1 origin "+${PAGES_BRANCH}:refs/remotes/origin/${PAGES_BRANCH}"
          actual_sha=$(git rev-parse "refs/remotes/origin/${PAGES_BRANCH}")
          expected_sha="${{ steps.pages-publish.outputs.commit }}"
          if [ "$actual_sha" != "$expected_sha" ]; then
            echo "Expected ${PAGES_BRANCH} at ${expected_sha}, found ${actual_sha}." >&2
            exit 1
          fi

          git archive "$actual_sha" | tar -x -C "$PAGES_PUBLISH_DIR"
          make ci-finalize-pages-dir root="$PAGES_PUBLISH_DIR"

      - name: Upload GitHub Pages artifact
        if: steps.setup.outputs.token-available == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ${{ env.PAGES_PUBLISH_DIR }}
          include-hidden-files: true

      - name: Deploy GitHub Pages artifact
        id: pages-deploy
        if: steps.setup.outputs.token-available == 'true'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          timeout: ${{ env.PAGES_DEPLOY_TIMEOUT_MS }}

      # Workflow-based Pages deploys do not write classic deployment records, so
      # create one ourselves for main-site publishes to keep the Deployments page
      # and github-pages environment badge honest. Previews and cleanup are excluded.
      - name: Create main deployment record
        id: deployment-record
        if: github.event_name != 'pull_request' && steps.setup.outputs.token-available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # required_contexts must be an empty JSON array, which plain -f cannot
          # express, so send the whole body as JSON through --input -.
          deployment_id=$(gh api "repos/${{ github.repository }}/deployments" \
            --input - --jq '.id' <<'JSON'
          {
            "ref": "${{ github.sha }}",
            "environment": "github-pages",
            "auto_merge": false,
            "required_contexts": [],
            "production_environment": true,
            "description": "Main site GitHub Pages deploy"
          }
          JSON
          )
          echo "id=$deployment_id" >> "$GITHUB_OUTPUT"

      - name: Post PR preview link
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available == 'true'
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3
        with:
          header: ${{ env.PREVIEW_COMMENT_HEADER }}
          recreate: true
          message: |
            CI preview

            Preview URL: ${{ steps.preview-url.outputs.url }}

      - name: Verify PR preview deployment
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available == 'true'
        run: >-
          python3 scripts/ci/verify_deploy.py
          --url "${{ steps.preview-url.outputs.url }}"
          --expected-substring "js/app.js?v=${{ steps.deploy-version.outputs.content-hash }}"
          --expected-commit-sha "${{ github.sha }}"
          --attempts ${{ env.VERIFY_DEPLOY_ATTEMPTS }}
          --delay-seconds ${{ env.VERIFY_DEPLOY_DELAY_SECONDS }}

      - name: Run PR preview browser verification
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available == 'true'
        env:
          ARTIFACTS_LIVE_SITE_URL: ${{ steps.preview-url.outputs.url }}
          ARTIFACTS_BROWSER_ARTIFACT_DIR: .artifacts/browser-live/pr-preview
        run: make test-browser-live

      - name: Note limited PR preview
        if: github.event_name == 'pull_request' && steps.setup.outputs.token-available != 'true'
        run: |
          {
            echo "## PR Preview"
            echo
            echo "Preview deployment is skipped because the app token is unavailable (fork or Dependabot PR)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve live site URL
        if: github.event_name != 'pull_request'
        id: live-site-url
        run: |
          site_url=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['artifacts']['site_url'])")
          echo "url=${site_url}" >> "$GITHUB_OUTPUT"

      - name: Verify main site deployment
        if: github.event_name != 'pull_request' && steps.setup.outputs.token-available == 'true'
        run: >-
          python3 scripts/ci/verify_deploy.py
          --url "${{ steps.live-site-url.outputs.url }}"
          --expected-substring "js/app.js?v=${{ steps.deploy-version.outputs.content-hash }}"
          --expected-commit-sha "${{ github.sha }}"
          --attempts ${{ env.VERIFY_DEPLOY_ATTEMPTS }}
          --delay-seconds ${{ env.VERIFY_DEPLOY_DELAY_SECONDS }}

      - name: Run live main site browser verification
        if: github.event_name != 'pull_request' && steps.setup.outputs.token-available == 'true'
        env:
          ARTIFACTS_LIVE_SITE_URL: ${{ steps.live-site-url.outputs.url }}
          ARTIFACTS_BROWSER_ARTIFACT_DIR: .artifacts/browser-live/main-site
        run: make test-browser-live

      - name: Mark main deployment successful
        if: github.event_name != 'pull_request' && steps.setup.outputs.token-available == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh api "repos/${{ github.repository }}/deployments/${{ steps.deployment-record.outputs.id }}/statuses"
          -f state=success
          -f environment_url="${{ steps.live-site-url.outputs.url }}"
          -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Summarize publish
        if: always()
        run: |
          {
            echo "## Publish"
            echo
            echo "Persist mode: ${{ needs.plan.outputs.persist-mode }}"
            echo "Reason: ${{ needs.plan.outputs.reason }}"
            echo "Verified artifact: site-${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload live browser failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: live-browser-artifacts-${{ github.run_id }}
          path: .artifacts/browser-live
          if-no-files-found: ignore
          overwrite: true

      - name: Mark main deployment failed
        if: failure() && steps.deployment-record.outputs.id != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh api "repos/${{ github.repository }}/deployments/${{ steps.deployment-record.outputs.id }}/statuses"
          -f state=failure
          -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # Persist thumbnails only when the planner explicitly allows it.
  # This job never regenerates thumbnails. It only applies the validated
  # thumbnail artifact built by `verify`.
  persist-thumbnails:
    if: >-
      !cancelled() &&
      github.event.action != 'closed' &&
      needs.plan.outputs.persist-mode != 'none' &&
      needs.assemble-site.outputs.thumbnail-artifact-changed == 'true' &&
      needs.publish.result == 'success'
    needs:
      - plan
      - assemble-site
      - publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: CI setup
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          head-repo-fork: ${{ github.event.pull_request.head.repo.fork || 'false' }}
          pr-author: ${{ github.event.pull_request.user.login || '' }}
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          escalation-app-id: ${{ vars.ESCALATION_APP_ID }}
          escalation-app-private-key: ${{ secrets.ESCALATION_APP_PRIVATE_KEY }}
          python-version: ${{ env.PYTHON_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

      - name: Download thumbnail persistence artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.assemble-site.outputs.thumbnail-artifact-name }}
          path: .artifacts/thumbnail-persist

      - name: Validate thumbnail artifact
        id: validate-artifact
        run: |
          plan=$(python3 scripts/ci/workflow_helpers.py validate-thumbnail-artifact --root .artifacts/thumbnail-persist)
          echo "json=$plan" >> "$GITHUB_OUTPUT"

      - name: Revalidate PR head state before branch writeback
        if: needs.plan.outputs.persist-mode == 'pr-branch'
        id: pr-head-state
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          current_sha=$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)
          current_ref=$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName)
          if [ "$current_sha" != "$PR_HEAD_SHA" ] || [ "$current_ref" != "$PR_HEAD_REF" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "stale=false" >> "$GITHUB_OUTPUT"

      - name: Apply thumbnail artifact and stage exact files
        id: stage-thumbnails
        if: needs.plan.outputs.persist-mode != 'pr-branch' || steps.pr-head-state.outputs.stale != 'true'
        run: |
          mapfile -t artifact_files < <(find .artifacts/thumbnail-persist/apps -type f -name 'thumbnail.webp' | sort)
          if [ "${#artifact_files[@]}" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "pathspec=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pathspec_file=.artifacts/thumbnail-pathspec.txt
          : > "$pathspec_file"

          for source in "${artifact_files[@]}"; do
            target=${source#.artifacts/thumbnail-persist/}
            mkdir -p "$(dirname "$target")"
            cp "$source" "$target"
            git add "$target"
            printf '%s\n' "$target" >> "$pathspec_file"
          done

          echo "changed=true" >> "$GITHUB_OUTPUT"
          {
            echo 'pathspec<<EOF'
            cat "$pathspec_file"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Persist thumbnails into the same PR branch
        if: >-
          needs.plan.outputs.persist-mode == 'pr-branch' &&
          steps.pr-head-state.outputs.stale != 'true' &&
          steps.stage-thumbnails.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ steps.setup.outputs.app-token }}
          base-branch: ${{ github.event.pull_request.head.ref }}
          expected-head-sha: ${{ github.event.pull_request.head.sha }}
          commit-headline: "Save generated app thumbnails"
          fallback-branch-prefix: ci/save-generated-thumbnails
          pr-title: "Save generated app thumbnails"
          pr-body: |
            ## Summary
            - Type: CI asset maintenance
            - Save generated `thumbnail.webp` files back to the current PR branch
          pathspec: ${{ steps.stage-thumbnails.outputs.pathspec }}
          commit-mode: direct

      - name: Create or update thumbnail follow-up PR
        if: >-
          needs.plan.outputs.persist-mode == 'followup-pr' &&
          steps.stage-thumbnails.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ steps.setup.outputs.escalation-token }}
          base-branch: ${{ github.event.repository.default_branch }}
          expected-head-sha: ${{ github.sha }}
          commit-headline: "Save generated app thumbnails"
          fallback-branch-prefix: ci/save-generated-thumbnails
          pr-title: "Save generated app thumbnails"
          pr-body: |
            <!-- artifacts:generated-thumbnails -->

            ## Summary
            - Type: CI asset maintenance
            - Save generated `thumbnail.webp` files back to the source repository
            - Keep merged branches aligned with the deployed preview and production site assets
          pathspec: ${{ steps.stage-thumbnails.outputs.pathspec }}
          commit-mode: force-pr

      - name: Summarize thumbnail persistence
        if: always()
        run: |
          {
            echo "## Thumbnail persistence"
            echo
            echo "Persist mode: ${{ needs.plan.outputs.persist-mode }}"
            echo "Reason: ${{ needs.plan.outputs.reason }}"
            echo "Artifact changed: ${{ needs.assemble-site.outputs.thumbnail-artifact-changed }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # Preview cleanup is isolated from publish/persistence. Closing or merging a PR
  # removes only that PR's preview subtree and preview comment.
  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    concurrency:
      group: pages-publish-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: write
      issues: write
      pages: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: CI setup
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: pull_request
          head-repo-fork: ${{ github.event.pull_request.head.repo.fork }}
          pr-author: ${{ github.event.pull_request.user.login }}
          app-id: ${{ vars.APP_ID }}
          app-private-key: ${{ secrets.APP_PRIVATE_KEY }}
          escalation-app-id: ${{ vars.ESCALATION_APP_ID }}
          escalation-app-private-key: ${{ secrets.ESCALATION_APP_PRIVATE_KEY }}

      - name: Remove PR preview deployment
        id: preview-removal
        if: steps.setup.outputs.token-available == 'true'
        env:
          GH_TOKEN: ${{ steps.setup.outputs.escalation-token }}
          PAGES_BRANCH: ${{ env.PAGES_BRANCH }}
          PREVIEW_ROOT: ${{ env.PREVIEW_ROOT }}
          COMMIT_MESSAGE: Remove preview for PR ${{ github.event.pull_request.number }}
          REMOVE_SUBDIR: ${{ env.PREVIEW_ROOT }}/pr-${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node ./.github/actions/deploy-site/deploy-verified.mjs

      - name: Resolve gh-pages cleanup commit
        id: pages-cleanup
        if: steps.setup.outputs.token-available == 'true'
        env:
          CLEANUP_COMMIT: ${{ steps.preview-removal.outputs.commit-sha }}
        run: |
          if [ -z "$CLEANUP_COMMIT" ]; then
            echo "No gh-pages cleanup commit output was produced." >&2
            exit 1
          fi
          echo "commit=$CLEANUP_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Materialize GitHub Pages payload
        if: steps.setup.outputs.token-available == 'true'
        run: |
          rm -rf "$PAGES_PUBLISH_DIR"
          mkdir -p "$PAGES_PUBLISH_DIR"

          git fetch --depth=1 origin "+${PAGES_BRANCH}:refs/remotes/origin/${PAGES_BRANCH}"
          actual_sha=$(git rev-parse "refs/remotes/origin/${PAGES_BRANCH}")
          expected_sha="${{ steps.pages-cleanup.outputs.commit }}"
          if [ "$actual_sha" != "$expected_sha" ]; then
            echo "Expected ${PAGES_BRANCH} at ${expected_sha}, found ${actual_sha}." >&2
            exit 1
          fi

          git archive "$actual_sha" | tar -x -C "$PAGES_PUBLISH_DIR"
          make ci-finalize-pages-dir root="$PAGES_PUBLISH_DIR"

      - name: Upload GitHub Pages artifact
        if: steps.setup.outputs.token-available == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ${{ env.PAGES_PUBLISH_DIR }}
          include-hidden-files: true

      - name: Deploy GitHub Pages artifact
        id: pages-deploy
        if: steps.setup.outputs.token-available == 'true'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          timeout: ${{ env.PAGES_DEPLOY_TIMEOUT_MS }}

      - name: Remove PR preview link comment
        if: steps.setup.outputs.token-available == 'true'
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3
        with:
          header: ${{ env.PREVIEW_COMMENT_HEADER }}
          delete: true
