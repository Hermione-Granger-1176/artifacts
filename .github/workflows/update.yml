name: Update Artifacts & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Create GitHub App token
        id: app-token
        if: github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Set up Python
        if: github.event.action != 'closed'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        if: github.event.action != 'closed'
        run: make setup-ci

      - name: Lint Python scripts and tests
        if: github.event.action != 'closed'
        run: make lint

      - name: Run Python tests
        if: github.event.action != 'closed'
        run: make test

      - name: Generate thumbnails
        if: github.event.action != 'closed'
        run: make thumbnails

      - name: Generate content index
        if: github.event.action != 'closed'
        run: make index

      - name: Detect changes
        if: github.event.action != 'closed'
        id: changes
        run: |
          git add -A js/data.js README.md apps
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated files (verified)
        if: github.event_name != 'pull_request' && github.event.action != 'closed' && steps.changes.outputs.changed == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const fs = require("fs");
            const { execSync } = require("child_process");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = context.ref.replace("refs/heads/", "");
            const headSha = context.sha;

            const additions = [];
            const deletions = [];
            const diffOutput = execSync(
              "git diff --staged --name-status -- js/data.js README.md apps"
            ).toString().trim();

            if (!diffOutput) {
              core.info("No files to commit");
              return;
            }

            for (const line of diffOutput.split("\n")) {
              const [status, filePath] = line.split(/\s+/, 2);
              if (status === "D") {
                deletions.push({ path: filePath });
              } else if (fs.existsSync(filePath)) {
                additions.push({
                  path: filePath,
                  contents: fs.readFileSync(filePath).toString("base64"),
                });
              }
            }

            if (additions.length === 0 && deletions.length === 0) {
              core.info("No files to commit");
              return;
            }

            const mutation = `
              mutation ($input: CreateCommitOnBranchInput!) {
                createCommitOnBranch(input: $input) {
                  commit { oid url }
                }
              }
            `;

            try {
              const result = await github.graphql(mutation, {
                input: {
                  branch: {
                    repositoryNameWithOwner: `${owner}/${repo}`,
                    branchName: defaultBranch,
                  },
                  expectedHeadOid: headSha,
                  message: {
                    headline: "Auto-update artifacts [skip ci]",
                  },
                  fileChanges: { additions, deletions },
                },
              });
              core.info(
                `Created verified commit: ${result.createCommitOnBranch.commit.url}`
              );
            } catch (err) {
              core.info(
                `Direct commit failed (${err.message}), creating branch and PR`
              );

              const date = new Date()
                .toISOString()
                .slice(0, 10)
                .replace(/-/g, "");
              const newBranch = `auto/update-artifacts-${date}`;

              let branchSha = headSha;
              try {
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/heads/${newBranch}`,
                  sha: headSha,
                });
              } catch {
                const { data: existingRef } = await github.rest.git.getRef({
                  owner,
                  repo,
                  ref: `heads/${newBranch}`,
                });
                branchSha = existingRef.object.sha;
              }

              await github.graphql(mutation, {
                input: {
                  branch: {
                    repositoryNameWithOwner: `${owner}/${repo}`,
                    branchName: newBranch,
                  },
                  expectedHeadOid: branchSha,
                  message: {
                    headline: "Auto-update artifacts",
                  },
                  fileChanges: { additions, deletions },
                },
              });

              const { data: existing } = await github.rest.pulls.list({
                owner,
                repo,
                state: "open",
                head: `${owner}:${newBranch}`,
              });

              if (existing.length === 0) {
                const { data: pr } = await github.rest.pulls.create({
                  owner,
                  repo,
                  head: newBranch,
                  base: defaultBranch,
                  title: "Auto-update artifacts",
                  body: "## Summary\n- Auto-generated artifacts update from `update.yml` workflow\n- Direct commit to default branch was blocked by branch protection\n",
                });
                core.info(`Created PR: ${pr.html_url}`);
              } else {
                core.info(`Updated existing PR: ${existing[0].html_url}`);
              }
            }

      - name: Re-checkout after API commit
        if: github.event_name != 'pull_request' && github.event.action != 'closed' && steps.changes.outputs.changed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare deployable site
        if: github.event.action != 'closed'
        run: make site

      - name: Deploy PR preview
        if: github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork
        id: preview
        uses: rossjrw/pr-preview-action@ffa7509e91a3ec8dfc2e5536c4d5c1acdf7a6de9 # v1
        with:
          source-dir: _site
          preview-branch: gh-pages
          token: ${{ steps.app-token.outputs.token }}
          qr-code: false

      - name: Summarize PR preview
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && !github.event.pull_request.head.repo.fork
        run: |
          {
            echo "## PR Preview"
            echo
            echo "Preview URL: ${{ steps.preview.outputs.preview-url }}"
            echo
            if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
              echo "Generated files changed during this run:"
              echo
              echo '```text'
              git diff --staged --name-status -- js/data.js README.md apps
              echo '```'
            else
              echo "No generated file changes were detected during this run."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Note fork PR preview limitation
        if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.fork
        run: |
          {
            echo "## PR Preview"
            echo
            echo "Preview deployment is skipped for fork-based pull requests because this workflow does not expose the app token to forks."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy main site to gh-pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4
        with:
          branch: gh-pages
          folder: _site
          token: ${{ steps.app-token.outputs.token }}
          clean-exclude: |
            pr-preview/
          force: false
          commit-message: Deploy site for ${{ github.sha }}
