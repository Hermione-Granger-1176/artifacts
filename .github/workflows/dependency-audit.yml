name: Dependency Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  PYTHONPATH: "."
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1

      - name: CI setup
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          python-version: "3.12"
          node-version: "24"
          install-deps: "true"

      - name: Run dependency audits
        id: audit
        run: |
          set +e
          make audit-python
          python_status=$?
          make audit-node
          node_status=$?
          make check-overrides
          overrides_status=$?
          set -e
          if [ "$python_status" -ne 0 ] || [ "$node_status" -ne 0 ] || [ "$overrides_status" -ne 0 ]; then
            status=1
          else
            status=0
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Open or update dependency audit issue
        if: steps.audit.outputs.status != '0'
        id: audit-issue
        env:
          GH_TOKEN: ${{ github.token }}
          ALERT_DETAIL: "Review the pip-audit, npm audit, and npm override checks from this run."
        run: |
          url=$(make ci-alert-issue state=open title="Dependency audit failed" run_url="$RUN_URL" detail="$ALERT_DETAIL")
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Close dependency audit issue when clean
        if: steps.audit.outputs.status == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: make ci-alert-issue state=close title="Dependency audit failed" run_url="$RUN_URL"

      - name: Summarize dependency audit failure
        if: steps.audit.outputs.status != '0'
        run: |
          {
            echo "## Dependency audit failed"
            echo
            echo "Inspect the pip-audit, npm audit, and npm override output in this run."
            echo "Issue: ${{ steps.audit-issue.outputs.url || 'issue not created' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert when dependency audit setup fails
        if: failure() && steps.audit.outputs.status == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: make ci-alert-issue state=setup-failure title="Dependency audit failed" run_url="$RUN_URL"

      - name: Fail workflow when audit detects issues
        if: steps.audit.outputs.status != '0'
        run: exit 1
