name: Live Site Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

env:
  PYTHONPATH: "."
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1

      - name: CI setup
        id: setup
        uses: ./.github/actions/ci-setup
        with:
          event-name: ${{ github.event_name }}
          python-version: "3.12"
          node-version: "24"
          install-deps: "true"

      - name: Resolve live site URL
        id: site-url
        run: |
          site_url=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['tool']['artifacts']['site_url'])")
          echo "url=${site_url}" >> "$GITHUB_OUTPUT"

      - name: Run published-site browser verification
        id: smoke
        env:
          ARTIFACTS_LIVE_SITE_URL: ${{ steps.site-url.outputs.url }}
          ARTIFACTS_BROWSER_ARTIFACT_DIR: .artifacts/browser-live/scheduled-smoke
        run: |
          set +e
          make test-browser-live
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload live-site smoke failure artifacts
        if: steps.smoke.outputs.status != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: live-site-smoke-artifacts-${{ github.run_id }}
          path: .artifacts/browser-live
          if-no-files-found: ignore
          overwrite: true

      - name: Open or update live-site smoke issue
        if: steps.smoke.outputs.status != '0'
        id: live-issue
        env:
          GH_TOKEN: ${{ github.token }}
          ALERT_DETAIL: "Published URL: ${{ steps.site-url.outputs.url }}"
        run: |
          url=$(make ci-alert-issue state=open title="Live site smoke check failed" run_url="$RUN_URL" detail="$ALERT_DETAIL")
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Close live-site smoke issue when clean
        if: steps.smoke.outputs.status == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: make ci-alert-issue state=close title="Live site smoke check failed" run_url="$RUN_URL"

      - name: Summarize live-site smoke failure
        if: steps.smoke.outputs.status != '0'
        run: |
          {
            echo "## Live site smoke failed"
            echo
            echo "Published URL: ${{ steps.site-url.outputs.url }}"
            echo "Issue: ${{ steps.live-issue.outputs.url || 'issue not created' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert when live-site smoke setup fails
        if: failure() && steps.smoke.outputs.status == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: make ci-alert-issue state=setup-failure title="Live site smoke check failed" run_url="$RUN_URL"

      - name: Fail workflow on smoke regression
        if: steps.smoke.outputs.status != '0'
        run: exit 1
