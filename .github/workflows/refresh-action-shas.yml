name: Refresh Action SHAs

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Capture default branch HEAD SHA
        id: head
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update action SHAs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import time
          from pathlib import Path
          from urllib.request import Request, urlopen

          token = os.environ.get("GH_TOKEN")
          if not token:
            raise SystemExit("GH_TOKEN is required")

          pattern = re.compile(r"^(\s*-\s*uses:\s*)([^@\s]+)@([^\s#]+)(.*)$")
          sha_pattern = re.compile(r"^[0-9a-f]{40}$")
          cache = {}
          timeout_seconds = 15
          max_attempts = 3

          def resolve_sha(action, ref):
            repo = "/".join(action.split("/")[:2])
            key = f"{repo}@{ref}"
            if key in cache:
              return cache[key]
            url = f"https://api.github.com/repos/{repo}/commits/{ref}"
            req = Request(url, headers={
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
            })
            last_error = None
            for attempt in range(1, max_attempts + 1):
              try:
                with urlopen(req, timeout=timeout_seconds) as response:
                  data = json.load(response)
                cache[key] = data["sha"]
                return cache[key]
              except Exception as exc:
                last_error = exc
                if attempt == max_attempts:
                  break
                time.sleep(attempt * 0.25)
            raise last_error

          workflow_dir = Path(".github/workflows")
          files = list(workflow_dir.glob("*.yml")) + list(workflow_dir.glob("*.yaml"))

          for path in files:
            lines = path.read_text(encoding="utf-8", errors="replace").splitlines()
            updated = False
            new_lines = []

            for line in lines:
              match = pattern.match(line)
              if not match:
                new_lines.append(line)
                continue

              prefix, action, ref, _suffix = match.groups()
              if action.startswith("./") or action.startswith("docker://") or "$" + "{{" in action:
                new_lines.append(line)
                continue

              if sha_pattern.fullmatch(ref):
                new_lines.append(line)
                continue

              sha = resolve_sha(action, ref)
              new_lines.append(f"{prefix}{action}@{sha} # {ref}")
              updated = True

            if updated:
              path.write_text("\n".join(new_lines) + "\n", encoding="utf-8")

          PY

      - name: Detect workflow changes
        id: changes
        run: |
          git add .github/workflows
          if git diff --staged --quiet -- .github/workflows; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes (verified)
        if: steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          base-branch: ${{ github.event.repository.default_branch }}
          expected-head-sha: ${{ steps.head.outputs.sha }}
          commit-headline: "Refresh action SHAs"
          fallback-branch-prefix: ci/refresh-action-shas
          pr-title: "Refresh action SHAs"
          pr-body: |
            ## Summary
            - Type: CI maintenance
            - Pin GitHub Actions to full commit SHAs for reproducible runs
            - Keep workflow behavior unchanged
          pathspec: |
            .github/workflows
