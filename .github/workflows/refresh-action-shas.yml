name: Refresh Action SHAs

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create escalation token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: escalation-token
        with:
          app-id: ${{ vars.ESCALATION_APP_ID }}
          private-key: ${{ secrets.ESCALATION_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Capture default branch HEAD SHA
        id: head
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Update action SHAs
        env:
          GH_TOKEN: ${{ steps.escalation-token.outputs.token }}
        run: make refresh-action-shas

      - name: Detect workflow changes
        id: changes
        run: |
          git add .github/workflows .github/actions
          if git diff --staged --quiet -- .github/workflows .github/actions; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes (verified)
        if: steps.changes.outputs.changed == 'true'
        uses: ./.github/actions/verified-commit
        with:
          github-token: ${{ steps.escalation-token.outputs.token }}
          base-branch: ${{ github.event.repository.default_branch }}
          expected-head-sha: ${{ steps.head.outputs.sha }}
          commit-headline: "Refresh action SHAs"
          fallback-branch-prefix: ci/refresh-action-shas
          pr-title: "Refresh action SHAs"
          pr-body: |
            ## Summary
            - Type: CI maintenance
            - Pin GitHub Actions to full commit SHAs for reproducible runs
            - Keep workflow behavior unchanged
          pathspec: |
            .github/workflows
            .github/actions
          commit-mode: force-pr
