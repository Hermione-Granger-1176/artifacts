name: Deploy site to GitHub Pages
description: Build _site/ and commit the deploy tree to gh-pages with a verified commit.

inputs:
  token:
    description: GitHub App token for pushing to gh-pages.
    required: true
  pages-branch:
    description: Branch to deploy to.
    required: false
    default: gh-pages
  preview-root:
    description: Preview directory to preserve during deploy.
    required: false
    default: pr-preview
  commit-sha:
    description: SHA to use in the deploy commit message.
    required: true
  deploy-dir:
    description: Directory containing the prepared site payload.
    required: false
    default: _site
  skip-build:
    description: Skip make site if _site/ is already prepared.
    required: false
    default: 'false'

outputs:
  short-sha:
    description: Short SHA used for cache-busting asset URLs.
    value: ${{ steps.deploy-version.outputs.short-sha }}
  deploy-commit-sha:
    description: Full source commit SHA used for deploy metadata verification.
    value: ${{ steps.deploy-version.outputs.commit-sha }}
  source-commit-sha:
    description: Full source commit SHA used for deploy metadata verification.
    value: ${{ steps.deploy-version.outputs.commit-sha }}
  pages-commit-sha:
    description: Full gh-pages commit SHA after the deploy tree update.
    value: ${{ steps.gh-pages-deploy.outputs.commit-sha }}
  deployed:
    description: Whether the gh-pages tree changed.
    value: ${{ steps.gh-pages-deploy.outputs.deployed }}

runs:
  using: composite
  steps:
    - name: Prepare deployable site
      if: inputs.skip-build != 'true'
      shell: bash
      env:
        ARTIFACTS_DEPLOY_COMMIT_SHA: ${{ inputs.commit-sha }}
      run: |
        export ARTIFACTS_DEPLOY_VERSION="$(printf '%s' "$ARTIFACTS_DEPLOY_COMMIT_SHA" | cut -c1-7)"
        make site

    - name: Resolve deployed asset marker
      id: deploy-version
      shell: bash
      run: |
        echo "short-sha=$(printf '%s' "${{ inputs.commit-sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"
        echo "commit-sha=${{ inputs.commit-sha }}" >> "$GITHUB_OUTPUT"

    - name: Deploy to gh-pages
      id: gh-pages-deploy
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PAGES_BRANCH: ${{ inputs.pages-branch }}
        PREVIEW_ROOT: ${{ inputs.preview-root }}
        COMMIT_MESSAGE: Deploy site for ${{ inputs.commit-sha }}
        DEPLOY_DIR: ${{ inputs.deploy-dir }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: node ./.github/actions/deploy-site/deploy-verified.mjs
