name: CI setup
description: Mint app tokens and optionally install the full toolchain. Requires actions/checkout to have run first.

inputs:
  event-name:
    description: GitHub event name for token policy.
    required: true
  head-repo-fork:
    description: Whether the PR head repo is a fork.
    required: false
    default: "false"
  pr-author:
    description: PR author login for token policy.
    required: false
    default: ""
  app-id:
    description: >-
      Primary GitHub App ID (Hermione1176). Primary and escalation inputs are all-or-nothing in trusted
      contexts; omit all four to skip primary-token minting (audit-only callers).
    required: false
    default: ""
  app-private-key:
    description: >-
      Primary GitHub App private key. All four primary/escalation inputs must be provided together in
      trusted contexts.
    required: false
    default: ""
  escalation-app-id:
    description: >-
      Escalation GitHub App ID (Harry1176). All four primary/escalation inputs must be provided together
      in trusted contexts.
    required: false
    default: ""
  escalation-app-private-key:
    description: >-
      Escalation GitHub App private key. All four primary/escalation inputs must be provided together in
      trusted contexts.
    required: false
    default: ""
  audit-app-id:
    description: Audit-only GitHub App ID (Percy1176). Only the audit workflow passes this; omit elsewhere.
    required: false
    default: ""
  audit-app-private-key:
    description: Audit-only GitHub App private key (Percy1176). Only the audit workflow passes this; omit elsewhere.
    required: false
    default: ""
  python-version:
    description: Python version to install.
    required: false
    default: "3.12"
  node-version:
    description: Node.js version to install (empty to skip).
    required: false
    default: ""
  install-deps:
    description: Whether to install workspace dependencies.
    required: false
    default: "false"
  install-browsers:
    description: Whether dependency setup installs Chromium for browser jobs.
    required: false
    default: "true"

outputs:
  app-token:
    description: Primary GitHub App installation token.
    value: ${{ steps.app-token.outputs.token }}
  escalation-token:
    description: Escalation GitHub App installation token.
    value: ${{ steps.escalation-token.outputs.token }}
  audit-token:
    description: >-
      Audit-only GitHub App installation token. Empty unless audit-app credentials were supplied AND the
      token was minted; also empty when the token policy denies minting (e.g., untrusted forks) or the
      audit-token step was otherwise skipped.
    value: ${{ steps.audit-token.outputs.token }}
  token-available:
    description: >-
      Whether both primary tokens (Hermione + Harry) were minted successfully. False when primary
      credentials were intentionally omitted (audit-only callers). Audit-token availability is orthogonal.
    value: ${{ steps.token-status.outputs.available }}

runs:
  using: composite
  steps:
    - name: Determine whether app-token actions are allowed
      id: token-policy
      shell: bash
      env:
        EVENT_NAME: ${{ inputs.event-name }}
        HEAD_REPO_FORK: ${{ inputs.head-repo-fork }}
        PR_AUTHOR: ${{ inputs.pr-author }}
      run: >-
        PYTHONPATH=. python3 scripts/ci/workflow_helpers.py app-token-policy
        --event-name "$EVENT_NAME"
        --head-repo-fork "$HEAD_REPO_FORK"
        --pr-author "$PR_AUTHOR"
        >> "$GITHUB_OUTPUT"

    - name: Validate primary token configuration
      if: >-
        steps.token-policy.outputs.allowed == 'true'
        && (inputs.app-id != '' || inputs.app-private-key != ''
        || inputs.escalation-app-id != '' || inputs.escalation-app-private-key != '')
      shell: bash
      env:
        APP_ID: ${{ inputs.app-id }}
        APP_PRIVATE_KEY: ${{ inputs.app-private-key }}
        ESCALATION_APP_ID: ${{ inputs.escalation-app-id }}
        ESCALATION_APP_PRIVATE_KEY: ${{ inputs.escalation-app-private-key }}
      run: |
        missing=()
        [ -z "$APP_ID" ] && missing+=("app-id")
        [ -z "$APP_PRIVATE_KEY" ] && missing+=("app-private-key")
        [ -z "$ESCALATION_APP_ID" ] && missing+=("escalation-app-id")
        [ -z "$ESCALATION_APP_PRIVATE_KEY" ] && missing+=("escalation-app-private-key")
        if [ "${#missing[@]}" -gt 0 ]; then
          echo "::error::Primary app inputs (app-id, app-private-key, escalation-app-id, escalation-app-private-key) must be provided together; missing: ${missing[*]}." >&2
          exit 1
        fi

    - name: Create GitHub App token
      id: app-token
      if: steps.token-policy.outputs.allowed == 'true' && inputs.app-id != '' && inputs.app-private-key != ''
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.app-private-key }}

    - name: Create escalation token
      id: escalation-token
      if: steps.token-policy.outputs.allowed == 'true' && inputs.escalation-app-id != '' && inputs.escalation-app-private-key != ''
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
      with:
        app-id: ${{ inputs.escalation-app-id }}
        private-key: ${{ inputs.escalation-app-private-key }}

    - name: Create audit token
      id: audit-token
      if: steps.token-policy.outputs.allowed == 'true' && inputs.audit-app-id != '' && inputs.audit-app-private-key != ''
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
      with:
        app-id: ${{ inputs.audit-app-id }}
        private-key: ${{ inputs.audit-app-private-key }}

    - name: Validate audit token configuration
      if: >-
        steps.token-policy.outputs.allowed == 'true'
        && (inputs.audit-app-id != '' || inputs.audit-app-private-key != '')
      shell: bash
      env:
        TOKEN_POLICY_ALLOWED: ${{ steps.token-policy.outputs.allowed }}
        AUDIT_APP_ID: ${{ inputs.audit-app-id }}
        AUDIT_APP_PRIVATE_KEY: ${{ inputs.audit-app-private-key }}
        AUDIT_TOKEN: ${{ steps.audit-token.outputs.token }}
      run: |
        if [ -z "$AUDIT_APP_ID" ] || [ -z "$AUDIT_APP_PRIVATE_KEY" ]; then
          echo "::error::Both audit-app-id and audit-app-private-key must be provided together; got only one." >&2
          exit 1
        fi
        if [ "$TOKEN_POLICY_ALLOWED" = "true" ] && [ -z "$AUDIT_TOKEN" ]; then
          echo "::error::Audit credentials were provided, but steps.audit-token.outputs.token is empty. Token minting failed or the app is not installed on this repository." >&2
          exit 1
        fi

    - name: Check GitHub App token availability
      id: token-status
      shell: bash
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
        ESCALATION_TOKEN: ${{ steps.escalation-token.outputs.token }}
      run: |
        if [ -n "$APP_TOKEN" ] && [ -n "$ESCALATION_TOKEN" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Fail if a trusted run cannot mint the app tokens
      if: >-
        steps.token-policy.outputs.allowed == 'true'
        && inputs.app-id != ''
        && steps.token-status.outputs.available != 'true'
      shell: bash
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
        ESCALATION_TOKEN: ${{ steps.escalation-token.outputs.token }}
      run: |
        echo "Expected GitHub App tokens for this run, but token creation did not succeed." >&2
        [ -z "$APP_TOKEN" ] && echo "  - Hermione1176 (APP_ID) token missing" >&2
        [ -z "$ESCALATION_TOKEN" ] && echo "  - Harry1176 (ESCALATION_APP_ID) token missing" >&2
        exit 1

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: uv.lock

    - name: Cache uv downloads
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/uv
        key: uv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('uv.lock') }}
        restore-keys: |
          uv-${{ runner.os }}-${{ inputs.python-version }}-
          uv-${{ runner.os }}-

    - name: Set up Node.js
      if: inputs.node-version != ''
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Cache virtual environment
      id: venv-cache
      if: inputs.install-deps == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ inputs.python-version }}-${{ hashFiles('uv.lock') }}

    - name: Cache node modules
      id: node-modules-cache
      if: inputs.install-deps == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('package-lock.json') }}

    - name: Cache Playwright browsers
      id: playwright-cache
      if: inputs.install-deps == 'true' && inputs.install-browsers == 'true'
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ hashFiles('uv.lock') }}

    - name: Install uv
      if: inputs.install-deps == 'true' && steps.venv-cache.outputs.cache-hit != 'true'
      shell: bash
      run: python -m pip install --upgrade pip uv

    - name: Install workspace dependencies
      if: inputs.install-deps == 'true'
      shell: bash
      env:
        INSTALL_BROWSERS: ${{ inputs.install-browsers }}
        VENV_CACHE_HIT: ${{ steps.venv-cache.outputs.cache-hit }}
        NODE_MODULES_CACHE_HIT: ${{ steps.node-modules-cache.outputs.cache-hit }}
        PLAYWRIGHT_CACHE_HIT: ${{ steps.playwright-cache.outputs.cache-hit }}
      run: |
        if [ "$VENV_CACHE_HIT" != "true" ]; then
          make install
        fi
        if [ "$NODE_MODULES_CACHE_HIT" != "true" ]; then
          make node-install
        fi
        if [ "$INSTALL_BROWSERS" = "true" ]; then
          if [ "$PLAYWRIGHT_CACHE_HIT" = "true" ]; then
            make setup-playwright
          else
            make setup-playwright-ci
          fi
        fi
