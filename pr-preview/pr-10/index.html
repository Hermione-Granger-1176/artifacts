<!DOCTYPE html>
<html lang="en" data-theme="light" data-runtime-status="booting">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="A collection of interactive HTML artifacts built with AI tools (Claude, ChatGPT, Gemini).">
  <title>Artifacts | Aditya Kumar Darak</title>
  <script>
    try {
      document.documentElement.dataset.theme = localStorage.getItem('theme') || 'light';
    } catch (_error) {
      document.documentElement.dataset.theme = 'light';
    }
  </script>
  <link rel="stylesheet" href="css/style.css?v=b8f05e2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Fredoka+One&display=swap" rel="stylesheet"
    media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Fredoka+One&display=swap"
      rel="stylesheet">
  </noscript>
  <link rel="icon" href="assets/icons/favicon.ico" sizes="32x32">
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="assets/icons/manifest.webmanifest">
  <meta name="theme-color" content="#f5efe6">
</head>

<body class="js-loading">
  <header class="header">
    <div class="header-content">
      <a href="./" class="logo-link">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="42" height="42" aria-hidden="true">
          <rect fill="#D97706" x="14" y="20" width="84" height="92" rx="18"></rect>
          <rect fill="#F3D6A6" x="26" y="12" width="84" height="92" rx="18"></rect>
          <line x1="42" y1="32" x2="94" y2="32" stroke="#C4A882" stroke-width="4" stroke-linecap="round"></line>
          <line x1="42" y1="52" x2="94" y2="52" stroke="#C4A882" stroke-width="4" stroke-linecap="round"></line>
          <line x1="42" y1="72" x2="86" y2="72" stroke="#C4A882" stroke-width="4" stroke-linecap="round"></line>
        </svg>
        <div class="logo-copy">
          <h1 class="logo">Artifacts</h1>
          <p class="logo-sub">A collection of interactive experiments</p>
        </div>
      </a>
      <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </header>

  <div id="runtime-error" class="runtime-error hidden" role="alert" aria-live="assertive">
    <p>The gallery failed to initialize correctly. Reload the page, or try again later.</p>
  </div>

  <main class="container book-layout">
    <nav id="filter-notes" class="desk-notes" aria-label="Filter by category"></nav>

    <div id="book-shell" class="book-shell">
      <div class="toolbar-ribbon" aria-label="Gallery controls">
        <section class="controls">
          <div class="search-wrapper">
            <label for="search-input" class="visually-hidden">Search artifacts</label>
            <input type="text" id="search-input" placeholder="Search artifacts...  ( / )" autocomplete="off">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <button id="search-clear" class="search-clear hidden" aria-label="Clear search">&times;</button>
          </div>

          <div class="control-cluster">
            <section class="filter-section" aria-label="Filters">
              <button id="sort-toggle" class="sort-toggle" type="button" aria-label="Sort by newest first"
                title="Sort by newest first">
                <svg class="sort-toggle-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M12 5v14"></path>
                  <path d="m17 14-5 5-5-5"></path>
                </svg>
              </button>

              <button id="filter-reset" class="filter-reset hidden" type="button" aria-label="Reset filters"
                title="Reset filters"></button>
            </section>
          </div>
        </section>
      </div>

      <section id="book-sheet" class="book-sheet" aria-label="Artifact book pages">
        <div class="book-spine" aria-hidden="true"></div>
        <div id="book-cover" class="book-cover" aria-hidden="true">
          <div class="book-cover-face">
            <h2 class="book-cover-title">Artifacts</h2>
            <p class="book-cover-sub">A Collection of Interactive Experiments</p>
            <p class="book-cover-author">Aditya Kumar Darak</p>
          </div>
          <div class="book-cover-back"></div>
        </div>
        <div class="book-inner">
          <section id="artifacts-grid" class="artifacts-grid" aria-live="polite">
            <noscript>
              <p>JavaScript is required to browse the artifact gallery.</p>
            </noscript>
          </section>

          <div id="no-results" class="no-results hidden" role="status">
            <p>No artifacts found matching your filters.</p>
            <button id="no-results-reset" class="btn-reset-link">Clear search and filters</button>
          </div>
        </div>
      </section>
    </div>

    <nav id="pagination" class="pagination" aria-label="Pagination"></nav>
  </main>

  <button id="scroll-top" class="scroll-top" aria-label="Scroll to top">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <div id="detail-overlay" class="detail-overlay" aria-hidden="true">
    <div class="detail-backdrop" data-close-detail></div>
    <section id="detail-panel" class="detail-panel" role="dialog" aria-modal="true"
      aria-labelledby="detail-title" tabindex="-1"></section>
  </div>

  <footer class="footer">
    <p>&copy; Aditya Kumar Darak &middot; <a href="https://github.com/Hermione-Granger-1176" target="_blank"
        rel="noopener noreferrer">GitHub</a> &middot; <a href="https://www.linkedin.com/in/aditya-darak/"
        target="_blank" rel="noopener noreferrer">LinkedIn</a></p>
  </footer>

  <script src="js/gallery-config.js?v=b8f05e2"></script>
  <script src="js/data.js?v=b8f05e2"></script>
  <script type="module" src="js/app.js?v=b8f05e2"></script>
</body>

</html>
