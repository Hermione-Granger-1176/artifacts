repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # Artifact metadata files keep their .editorconfig unset rules and
      # vendored assets stay byte-identical to upstream, so both are exempt
      # from whitespace and final-newline normalization. Markdown and lock
      # files keep trailing whitespace per .editorconfig trim rules.
      - id: trailing-whitespace
        exclude: (^apps/.*(/vendor/|\.(txt|webp|png|svg|ico)$)|\.(md|lock)$)
      - id: end-of-file-fixer
        exclude: ^apps/.*(/vendor/|\.(txt|webp|png|svg|ico)$)
      - id: check-merge-conflict
      - id: check-yaml

  - repo: local
    hooks:
      - id: lint-py
        name: lint-py
        entry: make lint-py
        language: system
        pass_filenames: false
      - id: format-py-check
        name: format-py-check
        entry: make format-py-check
        language: system
        pass_filenames: false
      - id: typecheck-py
        name: typecheck-py
        entry: make typecheck-py
        language: system
        pass_filenames: false
      - id: eslint
        name: eslint
        entry: make lint-js
        language: system
        pass_filenames: false
      - id: stylelint
        name: stylelint
        entry: make lint-css
        language: system
        pass_filenames: false
      - id: prettier-check
        name: prettier-check
        entry: make format-prettier-check
        language: system
        pass_filenames: false
      - id: web-typecheck
        name: web-typecheck
        entry: make typecheck-web
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: make test-py
        language: system
        pass_filenames: false
      - id: node-test
        name: node-test
        entry: make test-js
        language: system
        pass_filenames: false
